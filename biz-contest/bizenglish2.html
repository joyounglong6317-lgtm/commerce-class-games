<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비즈니스영어 2과제 매일 스피킹 연습</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,500&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --paper:#F5EFE1;
    --paper-deep:#EDE4CE;
    --card:#FFFDF8;
    --ink:#22242B;
    --ink-soft:#6B6A62;
    --line:#D9D0B8;
    --stamp:#A63A2E;
    --stamp-dark:#7E2C22;
    --teal:#2F6F62;
    --teal-soft:#E4EEEA;
    --gold:#B08D57;
    --shadow: 0 1px 2px rgba(34,36,43,.06), 0 8px 24px -12px rgba(34,36,43,.18);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 10% 0%, rgba(176,141,87,.10), transparent 40%),
      var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans KR', sans-serif;
    min-height:100vh;
    padding:28px 16px 60px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .masthead{
    display:flex; align-items:flex-end; justify-content:space-between;
    border-bottom:2px solid var(--ink); padding-bottom:14px; margin-bottom:6px;
  }
  .masthead .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.14em;
    color:var(--ink-soft); text-transform:uppercase;
  }
  .masthead h1{
    font-family:'Newsreader', serif; font-weight:700; font-size:26px; margin:2px 0 0;
    letter-spacing:-.01em;
  }
  .masthead .date{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); text-align:right;
  }
  .streak{
    display:flex; gap:6px; margin:16px 0 26px; flex-wrap:wrap;
  }
  .stamp-dot{
    width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600;
    border:1.5px solid var(--line); color:var(--ink-soft); background:var(--card);
  }
  .stamp-dot.done{
    border-color:var(--stamp); color:#fff; background:var(--stamp);
    box-shadow:0 0 0 2px rgba(166,58,46,.15);
    transform:rotate(-8deg);
  }

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:4px;
    box-shadow:var(--shadow); padding:26px 26px 24px; margin-bottom:18px;
    position:relative;
  }
  .card::before{
    content:""; position:absolute; left:0; top:18px; bottom:18px; width:3px;
    background:var(--gold); opacity:.55; border-radius:2px;
  }
  .card-inner{padding-left:12px;}

  .tag{
    display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10.5px;
    letter-spacing:.08em; text-transform:uppercase; padding:3px 8px; border-radius:3px;
    background:var(--teal-soft); color:var(--teal); font-weight:600; margin-bottom:10px;
  }
  .tag.trade{ background:#F1E7DA; color:var(--gold); }
  .tag.exam{ background:#F6DFDB; color:var(--stamp); }
  .tag.recon{ background:#F1E7DA; color:var(--gold); }
  .set-btn.exam{ border-color:var(--stamp); }
  .set-btn.recon{ border-color:var(--gold); }
  .set-btn .ex{ font-size:10.5px; color:var(--stamp); font-weight:700; margin-top:2px; letter-spacing:.03em; }
  .set-btn .ex.recon{ color:var(--gold); }

  h2.doc-title{ font-family:'Newsreader',serif; font-size:22px; font-weight:600; margin:0 0 14px; }

  .doc-text{
    font-size:15px; line-height:1.75; white-space:pre-wrap; color:#2B2D34;
  }
  .doc-text .meta-line{ color:var(--ink-soft); font-size:13px; margin-bottom:2px; }

  .btn{
    font-family:'IBM Plex Sans KR',sans-serif; font-weight:600; font-size:14px;
    padding:11px 20px; border-radius:3px; border:1.5px solid var(--ink); background:var(--ink);
    color:var(--paper); cursor:pointer; transition:transform .12s ease, opacity .12s ease;
  }
  .btn:hover{ transform:translateY(-1px); }
  .btn:active{ transform:translateY(0); }
  .btn.secondary{ background:transparent; color:var(--ink); }
  .btn.ghost{ background:transparent; color:var(--ink-soft); border-color:var(--line); font-weight:500; }
  .btn:disabled{ opacity:.4; cursor:not-allowed; transform:none; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .row.between{ justify-content:space-between; }

  .home-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:18px; }
  @media (max-width:520px){ .home-grid{ grid-template-columns:1fr; } }
  .set-btn{
    text-align:left; background:var(--card); border:1px solid var(--line); border-radius:4px;
    padding:14px 14px; cursor:pointer; box-shadow:var(--shadow);
  }
  .set-btn .no{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-soft); }
  .set-btn .ti{ font-family:'Newsreader',serif; font-weight:600; font-size:16px; margin-top:3px; }
  .set-btn .ty{ font-size:12px; color:var(--teal); margin-top:4px; font-weight:600; }
  .set-btn.trade .ty{ color:var(--gold); }

  .timer-ring{
    width:96px; height:96px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    background:conic-gradient(var(--stamp) calc(var(--pct,100)*1%), var(--paper-deep) 0);
    margin:0 auto 8px;
  }
  .timer-ring .inner{
    width:78px; height:78px; border-radius:50%; background:var(--card);
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:20px;
  }

  .qcounter{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-soft); letter-spacing:.06em; }
  .qtext{ font-family:'Newsreader',serif; font-size:20px; font-weight:600; margin:10px 0 16px; line-height:1.5; }

  .mic-btn{
    width:64px; height:64px; border-radius:50%; border:none; cursor:pointer;
    background:var(--stamp); color:#fff; font-size:22px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 0 var(--stamp-dark), var(--shadow);
    transition:transform .1s ease, box-shadow .1s ease;
  }
  .mic-btn:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--stamp-dark); }
  .mic-btn.listening{ animation:pulse 1.1s infinite; }
  @keyframes pulse{ 0%{box-shadow:0 4px 0 var(--stamp-dark),0 0 0 0 rgba(166,58,46,.4);} 70%{box-shadow:0 4px 0 var(--stamp-dark),0 0 0 14px rgba(166,58,46,0);} 100%{box-shadow:0 4px 0 var(--stamp-dark),0 0 0 0 rgba(166,58,46,0);} }

  textarea.ans{
    width:100%; min-height:80px; border:1.5px solid var(--line); border-radius:4px;
    padding:12px; font-family:'IBM Plex Sans KR',sans-serif; font-size:14.5px; line-height:1.6;
    resize:vertical; background:#FFFEFB;
  }
  textarea.ans:focus{ outline:2px solid var(--teal); outline-offset:1px; }

  .divider{ height:1px; background:var(--line); margin:18px 0; }

  .result-row{ border-bottom:1px dashed var(--line); padding:14px 0; }
  .result-row:last-child{ border-bottom:none; }
  .result-q{ font-weight:600; font-size:14px; margin-bottom:6px; }
  .result-you{ font-size:13.5px; color:#2B2D34; background:var(--paper-deep); padding:8px 10px; border-radius:3px; margin-bottom:6px; }
  .result-model{ font-size:13.5px; color:var(--teal); }
  .kw{ background:#FCEFC0; padding:0 2px; border-radius:2px; }

  .score-picker{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .score-picker button{
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; padding:5px 10px; border-radius:20px;
    border:1.5px solid var(--line); background:var(--card); cursor:pointer; color:var(--ink-soft);
  }
  .score-picker button.active{ border-color:var(--teal); color:var(--teal); background:var(--teal-soft); font-weight:600; }

  .total-badge{
    font-family:'IBM Plex Mono',monospace; font-size:34px; font-weight:600; color:var(--stamp);
  }
  .total-sub{ font-size:12px; color:var(--ink-soft); }

  .footnote{ font-size:12px; color:var(--ink-soft); margin-top:8px; line-height:1.6; }
  .kbd{ font-family:'IBM Plex Mono',monospace; background:var(--paper-deep); padding:1px 5px; border-radius:3px; font-size:11px; }

  /* ===== Auth / Admin screens ===== */
  .auth-card{ max-width:420px; margin:60px auto; }
  .auth-logo{ width:56px;height:56px;border-radius:50%;background:var(--ink);color:var(--paper);
    display:flex;align-items:center;justify-content:center;font-family:'Newsreader',serif;font-weight:700;font-size:22px;margin:0 auto 14px; }
  .field{ width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:4px; font-family:'IBM Plex Sans KR',sans-serif;
    font-size:14.5px; margin-bottom:10px; background:#FFFEFB; }
  .field:focus{ outline:2px solid var(--teal); outline-offset:1px; }
  .authmsg{ font-size:13px; font-weight:600; text-align:center; padding:9px 12px; border-radius:4px; margin-bottom:12px; }
  .authmsg.ok{ background:var(--teal-soft); color:var(--teal); }
  .authmsg.err{ background:#F6DFDB; color:var(--stamp); }
  .link-btn{ background:none; border:none; color:var(--teal); font-weight:600; font-size:13px; cursor:pointer; text-decoration:underline; padding:0; }
  .link-btn.muted{ color:var(--ink-soft); }
  .userbar{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
    background:var(--card); border:1px solid var(--line); border-radius:4px; padding:10px 14px; margin-bottom:14px; box-shadow:var(--shadow); }
  .userbar .who{ font-size:13px; font-weight:600; }
  .userbar .who .role{ font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--gold); margin-left:6px; }
  .dl-row{ display:flex; gap:8px; flex-wrap:wrap; margin:14px 0; }
  .dl-btn{ display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; text-decoration:none;
    color:var(--ink); background:var(--paper-deep); border:1px solid var(--line); padding:8px 12px; border-radius:4px; }
  .admin-table{ width:100%; border-collapse:collapse; font-size:13px; }
  .admin-table th{ text-align:left; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-soft);
    text-transform:uppercase; letter-spacing:.05em; border-bottom:1.5px solid var(--ink); padding:6px 8px; }
  .admin-table td{ padding:8px; border-bottom:1px dashed var(--line); vertical-align:middle; }
  .badge-pending{ background:#F6DFDB; color:var(--stamp); font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }
  .badge-approved{ background:var(--teal-soft); color:var(--teal); font-size:11px; font-weight:700; padding:2px 8px; border-radius:20px; }
  .mini-btn{ font-size:12px; font-weight:600; padding:5px 10px; border-radius:3px; border:1px solid var(--line); background:var(--card); cursor:pointer; }
  .mini-btn.approve{ border-color:var(--teal); color:var(--teal); }
  .mini-btn.danger{ border-color:var(--stamp); color:var(--stamp); }
  .admin-tabs{ display:flex; gap:6px; margin-bottom:14px; }
  .admin-tabs button{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:600; padding:7px 14px; border-radius:20px;
    border:1.5px solid var(--line); background:var(--card); cursor:pointer; color:var(--ink-soft); }
  .admin-tabs button.active{ border-color:var(--ink); color:var(--ink); background:var(--paper-deep); }
</style>
</head>

<script>
/* ============ 데이터: 2과제 연습세트 (자체제작 + 기출 아카이브) ============ */
const SETS = [{"no":1,"type":"비즈니스 레터","title":"견적 회신 (사무용 의자 주문)","meta":["Date: March 10, 2026","From: Jennifer Park, Sales Manager, Modern Office Solutions","To: Mr. Kim"],"body":["Dear Mr. Kim,","Thank you for your inquiry dated March 3, 2026, about our ergonomic office chairs. We have been manufacturing office furniture for over 15 years and export to more than 20 countries including Japan, Germany, and Australia.","Our best-selling model, the ErgoPro 300, is priced at $180 per unit for orders of 100 units or more. If you order 200 units or more, you will receive a 12% discount. For orders placed before March 31, we offer an additional 3% early-bird discount.","Germany is currently our largest export market, accounting for 30% of our total overseas sales, followed by Japan at 25%.","Delivery takes approximately 6 weeks from the date of order confirmation. We accept payment by T/T or L/C.","We look forward to your prompt order.","Sincerely,","Sales Manager","Jennifer Park","Modern Office Solutions"],"qa":[["What is the price of one ErgoPro 300 chair for orders of 100 units or more?","It is priced at $180 per unit."],["What discount can the buyer get for ordering 200 units or more?","They can get a 12% discount."],["Which country is the company's largest export market?","Germany is the company's largest export market."],["How long does delivery take from the date of order confirmation?","It takes approximately 6 weeks."],["What payment methods does the company accept?","They accept payment by T/T or L/C."]]},{"no":2,"type":"비즈니스 레터","title":"클레임 서신 (파손된 도자기 세트)","meta":["Date: April 5, 2026","From: David Lee, Purchasing Manager, SunRise Imports","To: Mr. Thompson"],"body":["Dear Mr. Thompson,","We received our order No. GL-2291 (500 sets of dinnerware) on April 2, 2026, three days later than the agreed delivery date of March 30. Upon inspection, we found that 45 sets, about 9% of the total shipment, were damaged during transit due to insufficient packaging.","We have attached photographs of the damaged items and a copy of the survey report issued by the local inspection agency. We request that you replace the 45 damaged sets within two weeks and provide a 5% discount on our next order as compensation for the delay.","Please confirm your response by April 12, 2026. We value our five-year business relationship with your company and hope this matter can be resolved promptly.","Sincerely,","Purchasing Manager","David Lee","SunRise Imports"],"qa":[["When did SunRise Imports receive order No. GL-2291?","They received it on April 2, 2026."],["How many sets of dinnerware were damaged?","45 sets were damaged."],["What was the cause of the damage?","The damage was caused by insufficient packaging."],["What compensation does SunRise Imports request for the delay?","They request a 5% discount on their next order."],["By when does SunRise Imports want a response?","They want a response by April 12, 2026."]]},{"no":3,"type":"비즈니스 레터","title":"대금 결제 독촉 및 연장 (섬유 대금)","meta":["Date: May 8, 2026","From: Robert Chen, Finance Director, Global Textile Co.","To: Ms. Garcia"],"body":["Dear Ms. Garcia,","We would like to remind you that payment of $24,500 for invoice No. GT-1187, issued on March 20, 2026, was due on April 20, 2026. As of today, we have not yet received your payment.","We understand that businesses sometimes face temporary cash flow difficulties, so we are willing to extend the payment deadline to May 31, 2026, without any additional interest, provided that we receive your written confirmation by May 15, 2026.","Please note that if payment is not received by the extended deadline, a late payment fee of 2% per month will apply, in accordance with Clause 8 of our sales contract.","We value our long-standing partnership and hope to resolve this matter smoothly.","Sincerely,","Finance Director","Robert Chen","Global Textile Co."],"qa":[["How much is the outstanding payment for invoice No. GT-1187?","It is $24,500."],["When was the original payment due date?","It was due on April 20, 2026."],["What is the new extended payment deadline?","The new deadline is May 31, 2026."],["What late payment fee will apply if payment is not received by the deadline?","A late payment fee of 2% per month will apply."],["By when must Blue Ocean Trading confirm the extension in writing?","They must confirm by May 15, 2026."]]},{"no":4,"type":"비즈니스 레터","title":"신제품 소개 (태양광 충전기)","meta":["Date: June 2, 2026","From: Export Sales Team, BrightTech Electronics","To: Mr. Alvarez"],"body":["Dear Mr. Alvarez,","We are pleased to introduce our new line of solar-powered chargers, launched this month. The flagship model, SunCharge X1, has a battery capacity of 20,000mAh and can fully charge a smartphone in just 90 minutes.","As one of the leading manufacturers of portable electronics in Asia, we currently export to 15 countries, with Brazil being our fastest-growing market, showing a 40% increase in sales last year.","The SunCharge X1 is priced at $35 per unit for orders under 500 units, and $28 per unit for orders of 500 units or more. We are also offering a free product sample to new distributors who place an order before June 30.","Our latest catalogue, including full specifications and pricing for all models, is attached. Please let us know if you would like to proceed with an order.","Sincerely,","Export Sales Team","BrightTech Electronics"],"qa":[["What is the battery capacity of the SunCharge X1?","It has a battery capacity of 20,000mAh."],["How long does it take to fully charge a smartphone with the SunCharge X1?","It takes 90 minutes."],["Which country is BrightTech Electronics' fastest-growing market?","Brazil is their fastest-growing market."],["What is the price per unit for orders of 500 units or more?","It is $28 per unit."],["What special offer is available to new distributors who order before June 30?","They can get a free product sample."]]},{"no":5,"type":"비즈니스 레터","title":"회의 일정 확인 (거래처 방문)","meta":["Date: July 1, 2026","From: Michael Yoon, Export Manager, KoreaLink Trading","To: Mr. Johnson"],"body":["Dear Mr. Johnson,","Thank you for your email confirming your visit to our Busan office. This is to confirm our meeting scheduled for Tuesday, July 15, 2026, at 10:00 a.m. at our headquarters, located at 45 Marine Drive, Busan.","The main agenda for the meeting will be to discuss the renewal of our distribution contract, which is set to expire on August 31, 2026, and to review the proposed 8% increase in the annual purchase volume.","Our Managing Director, Ms. Sarah Kim, along with two members of our export team, will attend the meeting. We expect the meeting to last approximately two hours, followed by a factory tour if time permits.","Please let us know if you require airport pickup or hotel arrangements. We look forward to welcoming you.","Sincerely,","Export Manager","Michael Yoon","KoreaLink Trading"],"qa":[["When is the meeting scheduled to take place?","It is scheduled for Tuesday, July 15, 2026, at 10:00 a.m."],["Where will the meeting be held?","It will be held at KoreaLink Trading's headquarters in Busan."],["What is the main agenda of the meeting?","The main agenda is to discuss the renewal of the distribution contract and the proposed increase in annual purchase volume."],["By when does the current distribution contract expire?","It expires on August 31, 2026."],["Who will attend the meeting from KoreaLink Trading?","The Managing Director, Ms. Sarah Kim, and two members of the export team will attend."]]},{"no":6,"type":"무역서류","title":"원산지증명서 (Certificate of Origin)","meta":[],"body":["CERTIFICATE OF ORIGIN","1. Exporter: DaeHan Electronics Co., Ltd., 120 Gasan-dong, Geumcheon-gu, Seoul, Korea","2. Consignee: Pacific Import Corp., 88 Harbor Street, Los Angeles, CA, U.S.A.","3. Means of transport: By Vessel (M.V. Pacific Star)","4. Country of Origin: Republic of Korea","5. Description of goods: LED Monitors, 24-inch","6. Quantity: 500 units","7. Invoice number an :true,"examLabel":"2024 시·도 상업경진대회","title":"기출(2024 시도) 클레임 합의 회신 서신 (수량 부족 배상)","docName":"Claim Settlement Letter","meta":["Hanstar Co., Ltd., 12 Gangnam-ro, Gangnam-gu, Seoul, Republic of Korea","February 14, 2024","To: S.B.K Co., Ltd."],"body":["Dear Mr. Theodore,","Thank you for your e-mail of February 12 in which you complained about the goods dropped in the boxes even though those were listed in the invoice.","After we have paid our prompt and careful attention to your e-mail, we found that our manufacture department could not meet the numbers of the goods you placed an order as they recorded more than 10% of production loss.","As those items were produced only for your market, we have enough materials to make the replacements for the shortage right away.","Instead, as a settlement, we would like to send the goods in your next order, and, of course, the amount you paid for the shortage this time will be deducted in our next invoice.","We have been enjoying our reputation for being punctual in meeting the delivery time stipulated and never did we fail to deliver our customer's orders in time.","We surely may be able to send the goods you need by the very next vessel sailing on March 24.","Additionally to settle this matter, we are ready to give you 15% special allowance.","Considering every factor affecting price increase, 15% of a reduction is quite a concession for them, and we guess it is a good proposition.","We apologize for the errors we made, and we will assure you that nothing like this case will occur in the future.","We hope this will not influence you unfavorably in this matter.","Sincerely Yours,","Hanstar Co., Ltd.","Kim Haesoo"],"qa":[["What is the name of the exporter?","The name of the exporter is Kim Haesoo of Hanstar Co., Ltd."],["When is the claim date of importer?","The claim date of importer is February 12."],["What is the cause of quantity shortage that the exporter says?","The exporter says the manufacturer department couldn't meet the number of goods, as they recorded more than 10% of production loss."],["What is the discount rate offered by the exporter?","The discount rate offered by the exporter is 15%."],["What is the main purpose of this letter?","The main purpose of this letter is to settle a claim."]]},{"no":15,"type":"비즈니스 레터","isExam":true,"examLabel":"2022 시·도 상업경진대회","title":"기출(2022 시도) 신용거래 승인 거절 안내 서신","docName":"Credit Application Denial Letter","rubric":{"c":2,"p":1,"g":1},"meta":["FastRabbit Trading Company Limited","Suwonchenro 350, MH Building, Hengungdong, Paldalgu, Suwon, Gyunggi-do, 16230","May 3rd, 2022","To: Jason Hong"],"body":["Dear Jason Hong,","Thank you for your recent business application for credit privileges with our company. We appreciate your interest in doing business with our company.","Regretfully, we are unable to approve your application at this time. If you have additional information which may assist us to reconsider this decision, please provide it within 10 days from the date of this letter.","The denial of your business credit application was based in whole or part upon the following reason(s):","- Insufficient credit history or length of time in business","- Insufficient credit references","- Unable to verify credit references","- Our previous credit experience with your business","- Record of unpaid taxes","In evaluating your business credit application, NO consumer reporting agency provided us with information that in whole or part influenced our decision.","Until we receive additional information or your company's business credit application is subsequently approved, we will gladly service your needs on a C.O.D. or cash basis.","Sincerely,","Section Chief","Kathy M. Winston"],"qa":[["What is the position of Kathy M. Winston in her company?","Her position is a section chief."],["Did Kathy Winston approve Jason's application?","No, she didn't. She denied the application."],["Within how many days does the company want the additional information?","It is ten days."],["Why was the business credit application denied? Answer at least three of the reasons.","(3개 이상 답변) Insufficient credit history or length of time in business / Insufficient credit references / Unable to verify credit references / Our previous credit experience with your business / Record of unpaid taxes."],["Now, in what terms of payment can Jason do business with the company?","He can do business on a C.O.D. or cash basis."]]},{"no":16,"type":"비즈니스 레터","isExam":true,"examLabel":"제11회 전국상업경진대회 (2021)","title":"기출(2021 전국) 신규 거래처 제안 서신 (Growtechpia)","docName":"Business Proposal Letter","rubric":{"c":2,"p":1,"g":1},"meta":["Growtechpia","Harrington Building 513 Ha-dong, Youngtong-gu, Suwon, Korea","Tel 031-532-1511   Fax 031-532-1513","Date: May 3, 2021","To: Mediatech, Inc. / Section Chief Mr. Jason"],"body":["Dear Mr. Jason,","We would like to introduce ourselves as one of the leading Set-top box manufacturers which was established in 1996.","We merged with Asia's largest media company, KK Media, in 2000. We founded the Asia branch in 2002, and continued to sell our products.","We are specialized in Digital HD receiver for Digital Cable & Satellite Pay TV. We are looking for new business opportunities, especially in the European market and think that you might be the right partner.","These are our 2 major business areas:","1. Digital Set-top box: Korea has a market share of 70% worldwide and gains predominance over the market due to the advanced technology and know-how from the analog market. Our products have the major specs of our brand-new product using Broadcom chipset for the European market. (Check the attached spec sheet with PDF format)","2. Security Solution: Growtechpia also supplies CAM for Satellite service & USB Dongle for IP Set-top box, which is to be inserted into a USB slot in IP Set-top Box or PC in order to identify and authorize the customer, and to perform the conditional access, copy protection and content protection function.","Looking forward to hearing from you for our mutual benefits in the near future. If you need more clarification or information, please feel free to contact us."],"qa":[["What is the main purpose of this letter?","The main purpose of this letter is to ask for a business partner."],["When was Growtechpia founded?","Growtechpia was founded in 1996."],["Where does Growtechpia want to extend its market?","Growtechpia wants to extend its market into Europe."],["Where can Mr. Jason get the information of brand-new product specs?","He can get the information in the attached spec sheet."],["For Security Solution, what does Growtechpia supply?","Growtechpia supplies CAM for Satellite service & USB Dongle."]]},{"no":17,"type":"음성메시지","isExam":true,"examLabel":"2021 시·도 상업경진대회","title":"기출(2021 시도) 고객 불만 음성메시지 (철제 테이블 환불 요청)","docName":"Customer Complaint Voice Message (Script)","rubric":{"c":2,"p":1,"g":1},"basedOn":"script","meta":["Voice message from a buyer (script)"],"body":["Hello. My name is Jessica whose customer number is S-413.","I'm calling to inform you of a problem about the steel round table I ordered.","The model number is P513.","On the internet homepage, you explained it would be easy to get together. But when I tried to assemble the parts, I found that one of the legs was already broken.","I sent you an e-mail about this problem last week, but no one replied. So I'm rather upset at the moment. Please refund it as soon as possible."],"qa":[["What did the customer buy?","The customer bought a steel round table."],["What is the customer's problem?","One of the legs (in the steel table) was broken."],["What does the customer want?","The customer wants to get a refund."],["How does the customer feel now?","The customer is upset (angry)."],["What is the model number?","The model number is P513."]]},{"no":18,"type":"무역서류","isExam":true,"examLabel":"2020 시·도 상업경진대회","title":"기출(2020 시도) 무역서류 판독 연습 (문서명은 본문에서 확인)","docName":"Bill of Exchange","hideTitle":true,"rubric":         Voyage No.: 303E        Flag: Korea","Port of Loading: Busan, Korea        Port of Discharge: Shanghai, China","Place of Delivery: Shanghai, China        Final Destination: Shanghai, China","Marks & Nos.: FRONT & BACK / S.T(IN DIA) / SHANGHAI — 40 CTNS","Description of Goods: SHIPPER'S LOAD, COUNT & SEAL — SAID TO CONTAIN: Q'TY 12 IN BOX, 7,200 PCS (600 DOZ) OF CELLULAR PHONE CASE, MADE IN KOREA (L/C NO. M42NY805NS0018)","Gross Weight: 850.00 KGS        Measurement: 16.085 CBM","Freight: FREIGHT COLLECT        Total: USD 533.40","Freight Payable at: Destination        Place of Issue: Seoul, Korea","No. of Original B/L: THREE (3)","Date of Issue / Laden on board vessel date: May 24, 2018","Signed by: GEOBUKSEON SHIPPING CO., LTD."],"qa":[["What is this shipping document?","This is Bill of Lading."],["Would you tell me export company?","The export company is GYUNGJIN CO., LTD."],["Would you tell me the Description of Goods?","It is a cellular phone case."],["How much does Gross weight?","It is 850 Kilograms."],["Would you tell me issuing date of this shipping document?","The issuing date is May 24, 2018."]]},{"no":23,"type":"무역서류","isExam":true,"reconstructed":true,"examLabel":"제12회 전국상업경진대회 (2022)","title":"지문원문·문항자체제작(2022 전국) 수출서류 안내문 (U.S. Dept. of Commerce)","docName":"Export Documents Guide (U.S. Department of Commerce)","rubric":{"c":2,"p":1,"g":1},"meta":["U.S. Department of Commerce","1401 Constitution Ave NW, Washington, DC 20230","[Commonly Used Export Documents]"],"body":["Export Compliance Documents","Electronic Export Information Filing (EEI) is the electronic export data as filed in the Automated Export System (AES). This data is the electronic equivalent of the export data formerly collected as Shipper's Export Declaration (SED) information. The EEI must be electronically filed via the Automated Export System online, which is a free service from Census and Customs. It is required for any shipments with items per Schedule B number exceeding $2,500 in value and for shipments of any value requiring an export license.","U.S. Principal Party in Interest (USPPI)","The USPPI, a required field in the EEI as defined in the Foreign Trade Regulations (\"FTR\"), is the person in the United States that receives the primary benefit, monetary or otherwise, of the export transaction. The attached article describes responsibilities of the USPPI, and offers a handy checklist to assure compliance with U.S. export regulations.","Export Licenses","An export license is a government document that authorizes the export of specific goods in specific quantities to a particular destination for a particular end-use. This document may be required for most or all exports to some countries or for other countries only under special circumstances. Examples of export-license certificates include those issued by the U.S. Department of Commerce's Bureau of Industry and Security (dual use articles), the State Department's Directorate of Defense Trade Controls (defense articles), the Nuclear Regulatory Commission (nuclear materials), and the U.S. Drug Enforcement Administration (controlled substances and precursor chemicals).","Destination Control Statement","A Destination Control Statement (DCS found in part 758.6 of the BIS Export Administration Regulations, or EAR) is required for exports from the United States for items on the Commerce Control List that are outside of EAR99 (products for which no license is required) or controlled under the International Traffic in Arms Regulations (ITAR). A DCS appears on the commercial invoice, ocean bill of lading, or airway bill to notify the carrier and all foreign parties that the item can be exported only to certain destinations."],"qa":[["What does EEI stand for?","EEI stands for Electronic Export Information (Filing)."],["Who is the USPPI?","The USPPI is the person in the United States that receives the primary benefit of the export transaction."],["For shipments exceeding how much in value is the EEI required?","It is required for shipments exceeding $2,500 in value, or for any shipment requiring an export license."],["Which government agency issues export licenses for nuclear materials?","The Nuclear Regulatory Commission issues export licenses for nuclear materials."],["Where does a Destination Control Statement appear?","It appears on the commercial invoice, ocean bill of lading, or airway bill."]]}];

async function hashPassword(pw) {
  const enc = new TextEncoder().encode('speaking2_salt_' + pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function ensureAdminExists() {
  const ref = db.collection(COL_USERS).doc('admin');
  const doc = await ref.get();
  if (!doc.exists) {
    const hashed = await hashPassword(ADMIN_DEFAULT_PW);
    await ref.set({ password: hashed, name: '관리자(교사)', role: 'admin', approved: true });
  }
}

let state = { view:"loading", setIdx:null, qIdx:0, answers:[], scores:[], recognizing:false, readTimeLeft:300, readTimerId:null, qTimeLeft:60, qTimerId:null, streak:{},
  authMode:"login", authMsg:null, adminTab:"users", adminUsers:[], adminScores:[], myScores:[] };

const KOR_STOPWORDS = new Set(["the","a","an","is","are","was","were","it","they","he","she","we","you","i","to","of","in","on","at","for","with","and","or","this","that","will","has","have","had","be","by","as","their","its","company","our","us"]);

function keywordsOf(text){
  return [...new Set(text.toLowerCase().replace(/[^a-z0-9%$.\s]/g," ").split(/\s+/).filter(w=>w.length>2 && !KOR_STOPWORDS.has(w)))];
}

function highlightMatches(userAns, modelAns){
  const kws = keywordsOf(modelAns);
  const userLower = userAns.toLowerCase();
  let html = modelAns;
  kws.forEach(k=>{
    if(userLower.includes(k)){
      const re = new RegExp("("+k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig");
      html = html.replace(re, "<span class='kw'>$1</span>");
    }
  });
  return html;
}

/* ============ 저장 (Firestore) ============ */
async function loadMyScores(){
  if(!db || !currentUser) { state.streak = {}; return; }
  try{
    const snap = await db.collection(COL_SCORES).where('userid','==',currentUser.userid).get();
    const streak = {};
    snap.forEach(doc=>{
      const d = doc.data();
      const key = (d.date||'').slice(0,10);
      if(!key) return;
      if(!streak[key] || d.total > streak[key].total) streak[key] = { setNo: d.setNo, total: d.total, maxTotal: d.maxTotal };
    });
    state.streak = streak;
  }catch(e){ console.error(e); state.streak = {}; }
}
async function saveScoreToFirestore(setNo, setTitle, total, maxTotal){
  if(!db || !currentUser) return;
  const now = new Date();
  try{
    await db.collection(COL_SCORES).add({
      userid: currentUser.userid,
      name: currentUser.name,
      setNo, setTitle, total, maxTotal,
      date: now.toISOString()
    });
    await loadMyScores();
  }catch(e){ console.error(e); }
}

/* ============ 유틸 ============ */
function todayIndex(){
  const d = new Date();
  const day = Math.floor(d.getTime()/86400000);
  return day % SETS.length;
}
function fmtTime(sec){
  const m = String(Math.floor(sec/60)).padStart(2,"0");
  const s = String(sec%60).padStart(2,"0");
  return m+":"+s;
}
function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = 0.95;
  window.speechSynthesis.speak(u);
}

/* ============ 렌더링 ============ */
function render(){
  const app = document.getElementById("app");
  try{
    app.innerHTML = "";
    if(state.view==="loading"){ app.appendChild(loadingView()); return; }
    if(state.view==="config"){ app.appendChild(configView()); return; }
    if(state.view==="auth"){ app.appendChild(authView()); return; }
    if(state.view==="pending"){ app.appendChild(masthead(true)); app.appendChild(pendingView()); return; }
    if(state.view==="admin"){ app.appendChild(masthead(true)); app.appendChild(adminView()); return; }
    app.appendChild(masthead(true));
    if(state.view==="home") app.appendChild(homeView());
    else if(state.view==="reading") app.appendChild(readingView());
    else if(state.view==="interview") app.appendChild(interviewView());
    else if(state.view==="result") app.appendChild(resultView());
  }catch(err){
    console.error("render() error:", err);
    app.innerHTML = "";
    const box = document.createElement("div");
    box.className = "card";
    box.style.maxWidth = "560px";
    box.style.margin = "60px auto";
    box.innerHTML = `<div class="card-inner">
      <h2 class="doc-title">화면을 표시하는 중 오류가 발생했어요</h2>
      <p style="font-size:13px;color:var(--ink-soft);line-height:1.7;margin:10px 0;">아래 오류 내용을 캡처해서 선생님(개발자)에게 보내주시면 원인을 바로 찾을 수 있어요. (브라우저에서 F12를 눌러도 같은 내용을 콘솔에서 볼 수 있습니다.)</p>
      <pre style="background:var(--paper-deep);padding:12px;border-radius:4px;font-size:12px;white-space:pre-wrap;overflow-x:auto;">${(err && err.stack) ? err.stack : String(err)}</pre>
      <button id="errHomeBtn" class="btn ghost" style="margin-top:14px;">처음으로</button>
    </div>`;
    app.appendChild(box);
    document.getElementById("errHomeBtn").onclick = ()=>{ state.view = currentUser ? "home" : "auth"; render(); };
  }
}

function el(tag, cls, html){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html!==undefined) e.innerHTML = html;
  return e;
}

function masthead(withUser){
  const wrap = el("div");
  const m = el("div","masthead");
  const left = el("div");
  left.appendChild(el("div","eyebrow","전국상업경진대회 · 비즈니스영어 제2과제"));
  left.appendChild(el("h1",null,"매일 5분, 회화 스피킹 연습"));
  m.appendChild(left);
  const right = el("div","date", new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"short"}));
  m.appendChild(right);
  wrap.appendChild(m);

  if(withUser && currentUser){
    const bar = el("div","userbar");
    const who = el("div","who", `${currentUser.name} 님<span class="role">${currentUser.role==='admin'?'교사/관리자':'학생'}</span>`);
    bar.appendChild(who);
    const btnRow = el("div","row");
    if(currentUser.role==='admin'){
      const toApp = el("button","btn ghost", state.view==="admin" ? "연습 화면 보기" : "관리자 화면");
      toApp.onclick = ()=>{ state.view = state.view==="admin" ? "home" : "admin"; if(state.view==="admin"){ loadAdminUsers(); loadAdminScores(); } render(); };
      btnRow.appendChild(toApp);
    }
    const logoutBtn = el("button","btn ghost","로그아웃");
    logoutBtn.onclick = doLogout;
    btnRow.appendChild(logoutBtn);
    bar.appendChild(btnRow);
    wrap.appendChild(bar);
    if(state.view!=="admin"){
      wrap.appendChild(downloadButtons());
      wrap.appendChild(el("p","footnote","※ 다운로드가 자동으로 시작되지 않으면, 링크가 새 탭에서 열립니다 — 그 탭에서 Ctrl/Cmd+S로 저장하거나 '다른 이름으로 저장'을 눌러주세요."));
    }
  }

  if(state.view!=="pending" && state.view!=="admin"){
    const streakRow = el("div","streak");
    const last14 = [];
    const base = new Date();
    for(let i=13;i>=0;i--){
      const d = new Date(base); d.setDate(base.getDate()-i);
      last14.push(d.toISOString().slice(0,10));
    }
    last14.forEach(key=>{
      const done = !!state.streak[key];
      const dot = el("div", "stamp-dot"+(done?" done":""), done ? "印" : (new Date(key)).getDate());
      dot.title = key + (done ? ` · ${state.streak[key].total}/20점` : "");
      streakRow.appendChild(dot);
    });
    wrap.appendChild(streakRow);
  }
  return wrap;
}

function startSet(idx){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  state.setIdx = idx; state.qIdx=0; state.answers=[]; state.scores=[];
  state.readTimeLeft = 300;
  state.view = "reading";
  render();
  clearInterval(state.readTimerId);
  state.readTimerId = setInterval(()=>{
    state.readTimeLeft--;
    if(state.readTimeLeft<=0){ clearInterval(state.readTimerId); goInterview(); return; }
    updateReadTimerDom();
  },1000);
}

function updateReadTimerDom(){
  const ring = document.getElementById("read-ring");
  const label = document.getElementById("read-label");
  if(!ring) return;
  const pct = Math.round((state.readTimeLeft/300)*100);
  ring.style.setProperty("--pct", pct);
  label.textContent = fmtTime(state.readTimeLeft);
}

function goHome(){
  clearInterval(state.readTimerId);
  clearInterval(state.qTimerId);
  if(state.recognizing && recognition){ try{ recognition.stop(); }catch(e){} }
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  state.view = "home";
  render();
}

function readingView(){
  const set = SETS[state.setIdx];
  const wrap = el("div");
  const card = el("div","card");
  const inner = el("div","card-inner");
  const rTagClass = set.reconstructed ? " recon" : (set.isExam ? " exam" : (set.type==="무역서류"?" trade":""));
  const rTagText = set.reconstructed ? `지문원문·문항자체제작 · ${set.examLabel}` : (set.isExam ? `기출 · ${set.examLabel}` : set.type);
  inner.appendChild(el("span","tag"+rTagClass, rTagText));
  inner.appendChild(el("h2","doc-title", set.title));

  const listenRow = el("div","row"); listenRow.style.margin="2px 0 14px";
  const listenBtn = el("button","btn secondary","🔊 지문 전체 듣기 (영어 음성)");
  const fullText = [...set.meta, ...set.body].join(". ");
  listenBtn.onclick = ()=>{
    if(!window.speechSynthesis){
      alert("이 브라우저는 음성 읽기를 지원하지 않아요.");
      return;
    }
    if(window.speechSynthesis.speaking){
      window.speechSynthesis.cancel();
      listenBtn.textContent = "🔊 지문 전체 듣기 (영어 음성)";
      return;
    }
    const u = new SpeechSynthesisUtterance(fullText);
    u.lang = "en-US"; u.rate = 0.92;
    u.onend = ()=>{ listenBtn.textContent = "🔊 지문 전체 듣기 (영어 음성)"; };
    u.onerror = ()=>{ listenBtn.textContent = "🔊 지문 전체 듣기 (영어 음성)"; };
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
    listenBtn.textContent = "⏹ 읽기 정지";
  };
  listenRow.appendChild(listenBtn);
  inner.appendChild(listenRow);

  const docBox = el("div","doc-text");
  set.meta.forEach(m=> docBox.appendChild(el("div","meta-line", m)));
  set.body.forEach(line=>{
    const p = el("p",null,line);
    p.style.margin = "0 0 10px";
    docBox.appendChild(p);
  });
  inner.appendChild(docBox);
  card.appendChild(inner);
  wrap.appendChild(card);

  const timerCard = el("div","card");
  const ti = el("div","card-inner");
  ti.style.textAlign="center";
  ti.appendChild(el("div","qcounter","준비시간 (읽기)"));
  const ring = el("div","timer-ring"); ring.id="read-ring"; ring.style.setProperty("--pct", Math.round((state.readTimeLeft/300)*100));
  ring.appendChild((()=>{const i=el("div","inner"); i.id="read-label"; i.textContent=fmtTime(state.readTimeLeft); return i;})());
  ti.appendChild(ring);
  const row = el("div","row"); row.style.justifyContent="center"; row.style.marginTop="14px";
  const goBtn = el("button","btn","인터뷰 바로 시작 →");
  goBtn.onclick = ()=>{ clearInterval(state.readTimerId); goInterview(); };
  row.appendChild(goBtn);
  ti.appendChild(row);
  timerCard.appendChild(ti);
  wrap.appendChild(timerCard);

  const backRow = el("div","row"); backRow.style.justifyContent="center"; backRow.style.marginTop="10px";
  const backBtn = el("button","btn ghost","← 다른 세트 고르기");
  backBtn.onclick = goHome;
  backRow.appendChild(backBtn);
  wrap.appendChild(backRow);
  return wrap;
}

function goInterview(){
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  state.qIdx = 0; state.view="interview"; state.qTimeLeft=60;
  render();
  runQTimer();
}

function runQTimer(){
  clearInterval(state.qTimerId);
  state.qTimeLeft = 60;
  state.qTimerId = setInterval(()=>{
    state.qTimeLeft--;
    const label = document.getElementById("q-time-label");
    if(label) label.textContent = fmtTime(state.qTimeLeft);
    if(state.qTimeLeft<=0){ clearInterval(state.qTimerId); }
  },1000);
}

let recognition = null;
function interviewView(){
  const set = SETS[state.setIdx];
  const q = set.qa[state.qIdx];
  const wrap = el("div");
  const card = el("div","card");
  const inner = el("div","card-inner");
  inner.appendChild(el("div","qcounter", `INTERVIEW · QUESTION ${state.qIdx+1} / ${set.qa.length}  ·  남은시간 <span id='q-time-label'>${fmtTime(state.qTimeLeft)}</span>`));
  inner.appendChild(el("div","qtext", q[0]));

  const listenRow = el("div","row");
  const listenBtn = el("button","btn secondary","🔊 질문 듣기 (TTS)");
  listenBtn.onclick = ()=> speak(q[0]);
  listenRow.appendChild(listenBtn);
  inner.appendChild(listenRow);

  inner.appendChild(el("div","divider"));

  const micRow = el("div","row");
  micRow.style.alignItems="center"; micRow.style.gap="16px";
  const mic = el("button","mic-btn","🎙");
  mic.title = "눌러서 말하기 (Chrome 음성인식)";
  const hint = el("div",null,"<div style='font-size:13px;color:var(--ink-soft);'>버튼을 누르고 <b>영어 문장을 끝까지</b> 말한 뒤, 마이크를 <b>다시 눌러 멈춰주세요</b>.<br>인식이 부정확하면 또박또박 천천히 말하거나 아래 칸에 직접 입력하세요.</div>");
  micRow.appendChild(mic);
  micRow.appendChild(hint);
  inner.appendChild(micRow);
  const micStatus = el("div",null,"");
  micStatus.style.cssText = "font-size:12.5px;font-weight:600;margin-top:8px;min-height:18px;";
  inner.appendChild(micStatus);

  const ta = el("textarea","ans");
  ta.placeholder = "답변을 입력하거나 음성 인식 결과가 여기에 표시됩니다.";
  ta.value = state.answers[state.qIdx] || "";
  ta.oninput = ()=>{ state.answers[state.qIdx] = ta.value; };
  inner.appendChild(el("div",null,"<div style='height:10px;'></div>"));
  inner.appendChild(ta);

  const clearRow = el("div","row"); clearRow.style.marginTop="6px";
  const clearBtn = el("button","link-btn muted","지우고 다시 녹음");
  clearBtn.onclick = ()=>{
    if(state.recognizing && recognition){ try{ recognition.stop(); }catch(e){} }
    ta.value = ""; state.answers[state.qIdx] = ""; setMicStatus("", null);
  };
  clearRow.appendChild(clearBtn);
  inner.appendChild(clearRow);

  function setMicStatus(text, kind){
    micStatus.textContent = text || "";
    micStatus.style.color = kind==="error" ? "var(--stamp)" : (kind==="ok" ? "var(--teal)" : "var(--ink-soft)");
  }

  const isSecure = location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1";
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!isSecure){
    mic.disabled = true;
    mic.style.opacity = .35;
    mic.title = "음성 인식은 HTTPS 주소(예: GitHub Pages)에서만 동작합니다.";
    setMicStatus("⚠ 이 페이지가 https:// 로 열려있지 않아 음성 인식을 사용할 수 없어요. GitHub Pages 등 https 주소에서 열어주세요. (직접 입력은 계속 가능합니다)", "error");
  }else if(SpeechRec){
    mic.onclick = ()=>{
      if(state.recognizing){
        try{ recognition && recognition.stop(); }catch(e){}
        return;
      }
      try{
        recognition = new SpeechRec();
        recognition.lang = "en-US";
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 5;
        let baseText = ta.value.trim() ? ta.value.trim() + " " : "";
        const modelKeywords = keywordsOf(q[1]);

        recognition.onstart = ()=>{
          state.recognizing = true;
          mic.classList.add("listening");
          setMicStatus("🎙 듣고 있어요 — 문장을 끝까지 말한 뒤 마이크를 다시 눌러 멈추세요.", "ok");
        };
        recognition.onend = ()=>{
          state.recognizing = false;
          mic.classList.remove("listening");
          state.answers[state.qIdx] = ta.value;
          if(ta.value.trim()) setMicStatus("✓ 녹음을 멈췄어요. 내용을 확인하고 필요하면 직접 수정하세요.", "ok");
        };
        recognition.onerror = (ev)=>{
          state.recognizing = false;
          mic.classList.remove("listening");
          const reasons = {
            "not-allowed": "마이크 권한이 차단되어 있어요. 주소창 왼쪽의 자물쇠(또는 카메라/마이크) 아이콘을 눌러 마이크 권한을 '허용'으로 바꾼 뒤 다시 눌러주세요.",
            "service-not-allowed": "마이크 권한이 차단되어 있어요. 브라우저 설정에서 이 사이트의 마이크 접근을 허용해주세요.",
            "no-speech": "음성이 감지되지 않았어요. 마이크에 더 가까이서, 조금 더 크게 다시 말씀해주세요.",
            "audio-capture": "마이크를 찾을 수 없어요. 마이크가 연결되어 있는지 확인해주세요.",
            "network": "네트워크 오류로 음성 인식에 실패했어요. 인터넷 연결을 확인하고 다시 시도해주세요.",
            "aborted": "음성 인식이 중단되었어요. 다시 눌러 시도해주세요."
          };
          setMicStatus("⚠ " + (reasons[ev.error] || ("음성 인식 오류(" + ev.error + "). 아래 칸에 직접 입력해주세요.")), "error");
        };
        // 발음이 다소 부정확해도, 모범답안에 나오는 핵심 단어와 가장 많이 겹치는 인식 후보를 골라줍니다.
        function pickBestAlternative(result){
          let best = result[0].transcript;
          let bestScore = -1;
          for(let k=0; k<result.length; k++){
            const alt = result[k].transcript;
            const altLower = alt.toLowerCase();
            let score = 0;
            modelKeywords.forEach(kw=>{ if(altLower.includes(kw)) score++; });
            score += (result.length - k) * 0.01; // 동점이면 원래 신뢰도 순서 유지
            if(score > bestScore){ bestScore = score; best = alt; }
          }
          return best;
        }
        recognition.onresult = (ev)=>{
          let finalChunk = "";
          let interimChunk = "";
          for(let i = ev.resultIndex; i < ev.results.length; i++){
            const result = ev.results[i];
            if(result.isFinal) finalChunk += pickBestAlternative(result);
            else interimChunk += result[0].transcript;
          }
          if(finalChunk){
            baseText = (baseText + finalChunk).trim() + " ";
          }
          ta.value = (baseText + interimChunk).trim();
          state.answers[state.qIdx] = ta.value;
          if(interimChunk){
            setMicStatus("🎙 인식 중: \"" + interimChunk + "\"", "ok");
          }else if(finalChunk){
            setMicStatus("✓ 인식됨: \"" + finalChunk.trim() + "\" — 계속 말하거나 마이크를 눌러 멈추세요.", "ok");
          }
        };
        recognition.start();
      }catch(err){
        state.recognizing=false; mic.classList.remove("listening");
        setMicStatus("⚠ 음성 인식을 시작하지 못했어요. 잠시 후 다시 눌러주세요.", "error");
      }
    };
  }else{
    mic.disabled = true;
    mic.title = "이 브라우저는 음성 인식을 지원하지 않습니다. 아래 칸에 직접 입력하세요.";
    mic.style.opacity = .35;
    setMicStatus("이 브라우저는 음성 인식을 지원하지 않아요 (Chrome 또는 Edge 데스크톱을 사용해주세요). 아래 칸에 직접 입력할 수 있어요.", "error");
  }

  const nav = el("div","row between"); nav.style.marginTop="18px";
  const prevBtn = el("button","btn ghost","← 이전");
  prevBtn.disabled = state.qIdx===0;
  prevBtn.onclick = ()=>{ state.qIdx--; runQTimer(); render(); };
  const nextBtn = el("button","btn", state.qIdx===set.qa.length-1 ? "채점표 보기 →" : "다음 질문 →");
  nextBtn.onclick = ()=>{
    if(state.qIdx===set.qa.length-1){
      clearInterval(state.qTimerId);
      state.scores = set.qa.map(()=>({c:null,p:null,g:null,fluency:null,accuracy:null}));
      state.view="result"; render();
    }else{
      state.qIdx++; runQTimer(); render();
    }
  };
  nav.appendChild(prevBtn); nav.appendChild(nextBtn);
  inner.appendChild(nav);

  const exitRow = el("div","row"); exitRow.style.justifyContent="center"; exitRow.style.marginTop="14px";
  const exitBtn = el("button","link-btn muted","그만하고 세트 목록으로");
  exitBtn.onclick = ()=>{ if(confirm("지금까지 입력한 답변이 사라집니다. 목록으로 돌아갈까요?")) goHome(); };
  exitRow.appendChild(exitBtn);
  inner.appendChild(exitRow);

  card.appendChild(inner);
  wrap.appendChild(card);
  return wrap;
}

function resultView(){
  const set = SETS[state.setIdx];
  const wrap = el("div");
  const card = el("div","card");
  const inner = el("div","card-inner");
  inner.appendChild(el("span","tag", "SELF-CHECK · 채점기준표 기반 자가평가"));
  inner.appendChild(el("h2","doc-title", `${set.title} · 결과`));

  set.qa.forEach((q,i)=>{
    const rub = set.rubric || { c:3, p:0.5, g:0.5 };
    const row = el("div","result-row");
    row.appendChild(el("div","result-q", `Q${i+1}. ${q[0]}`));
    row.appendChild(el("div","result-you", "내 답변: " + (state.answers[i] ? state.answers[i] : "(답변 없음)")));
    row.appendChild(el("div","result-model", "모범답안: " + highlightMatches(state.answers[i]||"", q[1])));

    const scoreWrap = el("div");
    if(rub.type==="band"){
      rub.criteria.forEach((critName, ci)=>{
        const key = ci===0 ? "fluency" : "accuracy";
        scoreWrap.appendChild(el("div",null,`<div style='font-size:11px;font-family:IBM Plex Mono,monospace;color:var(--ink-soft);margin-top:8px;'>${critName}</div>`));
        const picker = el("div","score-picker");
        rub.levels.forEach(lv=>{
          const b = el("button",null,`${lv.label} ${lv.point}`);
          b.onclick = ()=>{ state.scores[i][key]=lv.point; renderScoreState(); };
          if(state.scores[i][key]===lv.point) b.classList.add("active");
          picker.appendChild(b);
        });
        scoreWrap.appendChild(picker);
      });
    }else{
      scoreWrap.appendChild(el("div",null,`<div style='font-size:11px;font-family:IBM Plex Mono,monospace;color:var(--ink-soft);margin-top:10px;'>C(내용) 0 또는 ${rub.c}점</div>`));
      const cPicker = el("div","score-picker");
      [0,rub.c].forEach(v=>{
        const b = el("button",null,v+"점");
        b.onclick = ()=>{ state.scores[i].c=v; renderScoreState(); };
        if(state.scores[i].c===v) b.classList.add("active");
        cPicker.appendChild(b);
      });
      scoreWrap.appendChild(cPicker);

      scoreWrap.appendChild(el("div",null,`<div style='font-size:11px;font-family:IBM Plex Mono,monospace;color:var(--ink-soft);margin-top:8px;'>P(발음) 0 또는 ${rub.p}점 · G(문법) 0 또는 ${rub.g}점</div>`));
      const pgPicker = el("div","score-picker");
      [["P",0],["P",rub.p],["G",0],["G",rub.g]].forEach(([k,v])=>{
        const b = el("button",null,`${k} ${v}`);
        const key = k.toLowerCase();
        b.onclick = ()=>{ state.scores[i][key]=v; renderScoreState(); };
        if(state.scores[i][key]===v) b.classList.add("active");
        pgPicker.appendChild(b);
      });
      scoreWrap.appendChild(pgPicker);
    }
    row.appendChild(scoreWrap);
    inner.appendChild(row);
  });

  inner.appendChild(el("div","divider"));
  const totalRow = el("div","row between");
  const totalBox = el("div");
  totalBox.appendChild(el("div","total-badge", "id-total"));
  totalBox.appendChild(el("div","total-sub","/ 20점 (5문항 × 4점)"));
  totalRow.appendChild(totalBox);

  const saveBtn = el("button","btn", db ? "오늘의 연습 저장 (성적 기록)" : "저장하려면 Firebase 연결 필요");
  saveBtn.onclick = async ()=>{
    if(!db){
      saveBtn.textContent = "게스트 모드에서는 저장되지 않아요";
      setTimeout(goHome, 1200);
      return;
    }
    const total = computeTotal();
    saveBtn.disabled = true; saveBtn.textContent = "저장 중...";
    await saveScoreToFirestore(set.no, set.title, total, 20);
    saveBtn.textContent = "저장 완료 ✓";
    setTimeout(goHome, 700);
  };
  totalRow.appendChild(saveBtn);
  inner.appendChild(totalRow);

  const homeBtn = el("button","btn","다른 문제 풀기 (세트 목록으로) →");
  homeBtn.style.marginTop="14px";
  homeBtn.style.width="100%";
  homeBtn.onclick = goHome;
  inner.appendChild(homeBtn);

  card.appendChild(inner);
  wrap.appendChild(card);
  setTimeout(renderScoreState,0);
  return wrap;
}

function computeTotal(){
  return state.scores.reduce((sum,s)=> sum + (s.c||0) + (s.p||0) + (s.g||0) + (s.fluency||0) + (s.accuracy||0), 0);
}
function renderScoreState(){
  const badge = document.querySelector(".total-badge");
  if(badge) badge.textContent = computeTotal();
}

/* ============ 인증 화면 ============ */
function showAuthMsg(text, ok){ state.authMsg = { text, ok }; }

function authView(){
  const wrap = el("div","auth-card");
  const card = el("div","card");
  const inner = el("div","card-inner");
  inner.style.textAlign = "center";
  inner.appendChild(el("div","auth-logo","英"));
  inner.appendChild(el("h2","doc-title","비즈니스영어 2과제 연습"));
  inner.appendChild(el("p",null,"<p style='font-size:13px;color:var(--ink-soft);margin-bottom:16px;'>학생은 회원가입 후 선생님 승인을 받으면 이용할 수 있습니다.</p>"));

  if(state.authMsg){
    inner.appendChild(el("div","authmsg "+(state.authMsg.ok?"ok":"err"), state.authMsg.text));
  }

  if(state.authMode==="login"){
    const form = el("form");
    form.style.textAlign="left";
    const idInput = el("input","field"); idInput.type="text"; idInput.placeholder="아이디"; idInput.id="loginUserid";
    const pwInput = el("input","field"); pwInput.type="password"; pwInput.placeholder="비밀번호"; pwInput.id="loginPassword";
    const submitBtn = el("button","btn",""); submitBtn.textContent="로그인"; submitBtn.style.width="100%"; submitBtn.type="submit";
    form.appendChild(idInput); form.appendChild(pwInput); form.appendChild(submitBtn);
    form.onsubmit = async (e)=>{ e.preventDefault(); await doLogin(idInput.value.trim(), pwInput.value); };
    inner.appendChild(form);

    const row = el("div",null); row.style.marginTop="14px"; row.style.display="flex"; row.style.flexDirection="column"; row.style.gap="8px"; row.style.alignItems="center";
    const toSignup = el("button","link-btn","계정이 없으신가요? 회원가입"); toSignup.type="button";
    toSignup.onclick = ()=>{ state.authMode="signup"; state.authMsg=null; render(); };
    const toReset = el("button","link-btn muted","관리자 비밀번호를 잊으셨나요?"); toReset.type="button";
    toReset.onclick = ()=>{ state.authMode="reset"; state.authMsg=null; render(); };
    row.appendChild(toSignup); row.appendChild(toReset);
    inner.appendChild(row);
  } else if(state.authMode==="signup"){
    const form = el("form");
    form.style.textAlign="left";
    const idInput = el("input","field"); idInput.type="text"; idInput.placeholder="아이디"; idInput.id="signupUserid";
    const pwInput = el("input","field"); pwInput.type="password"; pwInput.placeholder="비밀번호 (4자 이상)"; pwInput.id="signupPassword";
    const nameInput = el("input","field"); nameInput.type="text"; nameInput.placeholder="이름"; nameInput.id="signupName";
    const submitBtn = el("button","btn",""); submitBtn.textContent="회원가입 요청"; submitBtn.style.width="100%"; submitBtn.type="submit";
    form.appendChild(idInput); form.appendChild(pwInput); form.appendChild(nameInput); form.appendChild(submitBtn);
    form.onsubmit = async (e)=>{ e.preventDefault(); await doSignup(idInput.value.trim(), pwInput.value, nameInput.value.trim()); };
    inner.appendChild(form);

    const back = el("button","link-btn","로그인으로 돌아가기"); back.type="button"; back.style.marginTop="14px";
    back.onclick = ()=>{ state.authMode="login"; state.authMsg=null; render(); };
    inner.appendChild(back);
  } else if(state.authMode==="reset"){
    inner.appendChild(el("p",null,"<p style='font-size:13px;color:var(--ink-soft);margin-bottom:10px;'>관리자 아이디는 <b>admin</b> 입니다. 복구 코드를 입력하고 새 비밀번호를 설정하세요.</p>"));
    const form = el("form");
    form.style.textAlign="left";
    const codeInput = el("input","field"); codeInput.type="text"; codeInput.placeholder="복구 코드";
    const pw1 = el("input","field"); pw1.type="password"; pw1.placeholder="새 비밀번호";
    const pw2 = el("input","field"); pw2.type="password"; pw2.placeholder="새 비밀번호 확인";
    const submitBtn = el("button","btn",""); submitBtn.textContent="비밀번호 재설정"; submitBtn.style.width="100%"; submitBtn.type="submit";
    form.appendChild(codeInput); form.appendChild(pw1); form.appendChild(pw2); form.appendChild(submitBtn);
    form.onsubmit = async (e)=>{ e.preventDefault(); await doAdminReset(codeInput.value.trim(), pw1.value, pw2.value); };
    inner.appendChild(form);

    const back = el("button","link-btn","로그인으로 돌아가기"); back.type="button"; back.style.marginTop="14px";
    back.onclick = ()=>{ state.authMode="login"; state.authMsg=null; render(); };
    inner.appendChild(back);
  }

  card.appendChild(inner);
  wrap.appendChild(card);
  return wrap;
}

async function doLogin(userid, password){
  if(!userid || !password){ showAuthMsg("아이디와 비밀번호를 입력해주세요.", false); render(); return; }
  try{
    const doc = await db.collection(COL_USERS).doc(userid).get();
    if(!doc.exists){ showAuthMsg("아이디 또는 비밀번호가 일치하지 않습니다.", false); render(); return; }
    const hashed = await hashPassword(password);
    if(doc.data().password !== hashed){ showAuthMsg("아이디 또는 비밀번호가 일치하지 않습니다.", false); render(); return; }
    currentUser = { userid, ...doc.data() };
    localStorage.setItem(SESSION_KEY, userid);
    state.authMsg = null;
    await afterLogin();
  }catch(e){ console.error(e); showAuthMsg("로그인 중 오류가 발생했습니다.", false); render(); }
}

async function doSignup(userid, password, name){
  if(!userid || !password || !name){ showAuthMsg("모든 항목을 입력해주세요.", false); render(); return; }
  if(password.length < 4){ showAuthMsg("비밀번호는 4자 이상으로 입력해주세요.", false); render(); return; }
  try{
    const ref = db.collection(COL_USERS).doc(userid);
    const doc = await ref.get();
    if(doc.exists){ showAuthMsg("이미 존재하는 아이디입니다.", false); render(); return; }
    const hashed = await hashPassword(password);
    await ref.set({ password: hashed, name, role: 'student', approved: false });
    state.authMode = "login";
    showAuthMsg("회원가입 신청이 완료되었습니다. 선생님 승인 후 로그인할 수 있어요.", true);
    render();
  }catch(e){ console.error(e); showAuthMsg("회원가입 중 오류가 발생했습니다.", false); render(); }
}

async function doAdminReset(code, pw1, pw2){
  if(code !== ADMIN_RECOVERY_CODE){ showAuthMsg("복구 코드가 일치하지 않습니다.", false); render(); return; }
  if(!pw1 || pw1.length < 4){ showAuthMsg("비밀번호는 4자 이상으로 입력해주세요.", false); render(); return; }
  if(pw1 !== pw2){ showAuthMsg("새 비밀번호가 서로 일치하지 않습니다.", false); render(); return; }
  try{
    const hashed = await hashPassword(pw1);
    await db.collection(COL_USERS).doc('admin').set({ password: hashed, name: '관리자(교사)', role: 'admin', approved: true }, { merge: true });
    state.authMode = "login";
    showAuthMsg("비밀번호가 재설정되었습니다. admin으로 로그인해주세요.", true);
    render();
  }catch(e){ console.error(e); showAuthMsg("재설정 중 오류가 발생했습니다.", false); render(); }
}

function doLogout(){
  localStorage.removeItem(SESSION_KEY);
  currentUser = null;
  state.view = "auth"; state.authMode = "login"; state.streak = {};
  render();
}

async function afterLogin(){
  if(currentUser.role === 'admin'){
    state.view = "admin";
    await loadAdminUsers();
    await loadAdminScores();
    render();
    return;
  }
  if(!currentUser.approved){
    state.view = "pending";
    render();
    return;
  }
  state.view = "home";
  await loadMyScores();
  render();
}

/* ============ 승인 대기 화면 ============ */
function pendingView(){
  const wrap = el("div","card"); wrap.style.maxWidth="420px"; wrap.style.margin="40px auto"; wrap.style.textAlign="center";
  const inner = el("div","card-inner");
  inner.appendChild(el("div",null,"<div style='font-size:40px;margin-bottom:10px;'>⏳</div>"));
  inner.appendChild(el("h2","doc-title","승인 대기 중입니다"));
  inner.appendChild(el("p",null,"<p style='font-size:14px;color:var(--ink-soft);line-height:1.7;'>선생님의 가입 승인이 완료되면<br>연습 문제를 풀 수 있습니다.</p>"));
  wrap.appendChild(inner);
  return wrap;
}

/* ============ 관리자 화면 ============ */
async function loadAdminUsers(){
  if(!db) return;
  const snap = await db.collection(COL_USERS).get();
  state.adminUsers = snap.docs.filter(d=>d.id!=='admin').map(d=>({ id:d.id, ...d.data() }));
}
async function loadAdminScores(){
  if(!db) return;
  const snap = await db.collection(COL_SCORES).orderBy('date','desc').limit(200).get();
  state.adminScores = snap.docs.map(d=>d.data());
}
async function approveUser(id){
  await db.collection(COL_USERS).doc(id).update({ approved: true });
  await loadAdminUsers(); render();
}
async function deleteUser(id){
  if(!confirm("정말 삭제하시겠습니까?")) return;
  await db.collection(COL_USERS).doc(id).delete();
  await loadAdminUsers(); render();
}

function adminView(){
  const wrap = el("div");
  wrap.appendChild(downloadButtons());
  wrap.appendChild(el("p","footnote","※ 다운로드가 자동으로 시작되지 않으면, 링크가 새 탭에서 열립니다 — 그 탭에서 Ctrl/Cmd+S로 저장하거나 '다른 이름으로 저장'을 눌러주세요."));

  const tabs = el("div","admin-tabs");
  ["users","scores"].forEach(t=>{
    const b = el("button", t===state.adminTab?"active":"", t==="users"?"학생 승인 관리":"성적 현황");
    b.onclick = ()=>{ state.adminTab=t; render(); };
    tabs.appendChild(b);
  });
  wrap.appendChild(tabs);

  const card = el("div","card");
  const inner = el("div","card-inner");

  if(state.adminTab==="users"){
    inner.appendChild(el("h2","doc-title","학생 가입 승인"));
    if(state.adminUsers.length===0){
      inner.appendChild(el("p",null,"<p style='color:var(--ink-soft);font-size:13px;'>가입한 학생이 없습니다.</p>"));
    }else{
      const table = el("table","admin-table");
      table.innerHTML = "<tr><th>이름</th><th>아이디</th><th>상태</th><th></th></tr>";
      state.adminUsers.forEach(u=>{
        const tr = el("tr");
        tr.appendChild(el("td",null,escapeHtml(u.name)));
        tr.appendChild(el("td",null,`<span class='kbd'>${escapeHtml(u.id)}</span>`));
        tr.appendChild(el("td",null, u.approved ? "<span class='badge-approved'>승인 완료</span>" : "<span class='badge-pending'>승인 대기</span>"));
        const actionTd = el("td");
        const btnRow = el("div","row");
        if(!u.approved){
          const ap = el("button","mini-btn approve","승인");
          ap.onclick = ()=>approveUser(u.id);
          btnRow.appendChild(ap);
        }
        const del = el("button","mini-btn danger","삭제");
        del.onclick = ()=>deleteUser(u.id);
        btnRow.appendChild(del);
        actionTd.appendChild(btnRow);
        tr.appendChild(actionTd);
        table.appendChild(tr);
      });
      inner.appendChild(table);
    }
  }else{
    inner.appendChild(el("h2","doc-title","모의 인터뷰 성적 현황"));
    if(state.adminScores.length===0){
      inner.appendChild(el("p",null,"<p style='color:var(--ink-soft);font-size:13px;'>아직 기록된 성적이 없습니다.</p>"));
    }else{
      const table = el("table","admin-table");
      table.innerHTML = "<tr><th>이름</th><th>세트</th><th>점수</th><th>일시</th></tr>";
      state.adminScores.forEach(s=>{
        const tr = el("tr");
        tr.appendChild(el("td",null,escapeHtml(s.name||"")));
        tr.appendChild(el("td",null,escapeHtml(String(s.setTitle||s.setNo||""))));
        tr.appendChild(el("td",null,`<b>${s.total}</b> / ${s.maxTotal||20}`));
        tr.appendChild(el("td",null, s.date ? new Date(s.date).toLocaleString("ko-KR") : ""));
        table.appendChild(tr);
      });
      inner.appendChild(table);
    }
  }

  card.appendChild(inner);
  wrap.appendChild(card);
  return wrap;
}

function escapeHtml(str){
  const d = document.createElement("div");
  d.innerText = str==null ? "" : String(str);
  return d.innerHTML;
}

/* ============ 부트스트랩 ============ */
async function boot(){
  try{
    if(!firebaseConfig.apiKey){
      state.view = "config"; render(); return;
    }
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    await ensureAdminExists();

    const savedId = localStorage.getItem(SESSION_KEY);
    if(savedId){
      const doc = await db.collection(COL_USERS).doc(savedId).get();
      if(doc.exists){
        currentUser = { userid: savedId, ...doc.data() };
        await afterLogin();
        return;
      }else{
        localStorage.removeItem(SESSION_KEY);
      }
    }
    state.view = "auth"; state.authMode = "login";
    render();
  }catch(e){
    console.error(e);
    state.view = "config"; render();
  }
}

/* ============ 시작 ============ */
boot();
</script>
