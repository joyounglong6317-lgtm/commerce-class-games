<!--
====================================================================
  선생님 설정 안내 (README) — 꼭 읽어주세요
====================================================================
  1) FIREBASE_CONFIG (스크립트 앞부분)에 선생님의 Firebase 콘솔 config를
     붙여넣으세요. 비워두면 이 브라우저의 localStorage만 사용하는
     데모 모드로 동작합니다(실시간 기능은 제한적으로만 동작).

  2) TEACHER_PASSWORD 상수를 반드시 선생님만 아는 비밀번호로 바꿔주세요.
     "선생님 모드" 버튼을 눌렀을 때 이 비밀번호로 잠금이 걸립니다.

  3) 학생 로그인: 학번 + 이름 + PIN(4자리 숫자)으로 로그인합니다.
     처음 로그인할 때 입력한 PIN이 그 학번의 PIN으로 저장되고,
     다음부터는 같은 PIN을 입력해야 로그인됩니다(다른 학생이 남의
     학번으로 들어가는 것을 막기 위한 최소한의 보호 장치입니다).
     PIN을 잊어버린 학생은 선생님 모드 > 학생관리에서 PIN 초기화를
     눌러주시면 다음 로그인 때 새 PIN을 설정할 수 있습니다.

  4) 선생님 모드 안에서:
     - "실시간 성적현황": 학생들이 문제를 풀 때마다 점수가 올라옵니다.
       (Firebase 연동 시 실시간 반영 / 데모 모드에서는 4초마다 새로고침)
     - "학생관리": PIN 초기화, 학생 기록 삭제
     - "문제 등록": 문제를 하나씩 입력해서 추가하거나, PDF 파일을
       업로드해서 여러 문제를 한 번에 등록할 수 있습니다.

  5) PDF 일괄 등록 형식 (교사 화면에도 안내가 표시됩니다):
     [영역] 의사소통능력
     [단계] 심화
     Q1. 문제 내용을 입력합니다
     1) 보기1
     2) 보기2
     3) 보기3
     4) 보기4
     정답: 2
     해설: 해설 내용

     Q2. 다음 문제...
     ...

     - [영역]/[단계]는 한 번 쓰면 다음에 다시 나올 때까지 계속 적용됩니다.
     - 텍스트 기반 PDF(문서 파일)만 인식됩니다. 스캔 이미지 PDF는
       텍스트 추출이 되지 않을 수 있습니다.
     - 업로드 후 미리보기에서 인식된 문제 개수를 확인하고 등록하세요.
====================================================================
-->

<style>

</style>

async function sha256Hex(text){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}

        { q:"문서이해능력이란 무엇을 의미하는가?", choices:["문서를 빠르게 인쇄하는 능력","문서의 내용을 정확히 읽고 의미를 파악하는 능력","문서를 화려하게 디자인하는 능력","문서를 많이 보관하는 능력"], answer:1, explain:"문서이해능력은 문서의 내용을 정확히 읽고 핵심 의미를 파악하는 능력입니다." },
        { q:"다음 중 공문서에 해당하지 않는 것은?", choices:["기안문","보도자료","개인 일기","공고문"], answer:2, explain:"개인 일기는 업무용 공문서가 아닙니다." },
        { q:"전화 응대 시 가장 기본이 되는 태도는?", choices:["빠르게 말하고 끊는다","용건을 정확히 확인하고 메모한다","상대의 이름을 묻지 않는다","감정적으로 대응한다"], answer:1, explain:"전화 응대는 용건을 정확히 확인하고 메모하는 것이 기본입니다." },
        { q:"비언어적 의사소통 요소에 해당하지 않는 것은?", choices:["표정","억양","이메일 본문의 단어 선택","몸짓"], answer:2, explain:"이메일 본문의 단어 선택은 언어적 표현입니다." },
        { q:"문서 작성 시 가장 우선시해야 할 원칙은?", choices:["화려한 수사","정확한 정보 전달","긴 문장 구성","개인적인 의견 강조"], answer:1, explain:"업무 문서는 정확한 정보 전달을 최우선으로 해야 합니다." },
        { q:"다음 중 의사표현능력을 높이는 방법으로 옳은 것은?", choices:["전달하려는 핵심을 먼저 정리한다","생각나는 대로 말한다","상대방 반응은 신경 쓰지 않는다","가능한 한 길게 설명한다"], answer:0, explain:"핵심을 먼저 정리하고 말하면 의사표현이 명확해집니다." },
        { q:"다음 중 올바른 전화 통화 종료 인사로 가장 적절한 것은?", choices:["네, 알겠습니다. 끊습니다","감사합니다. 좋은 하루 되세요","저는 바쁘니 이만 끊겠습니다","용건 없으면 끊을게요"], answer:1, explain:"감사 인사와 함께 정중하게 마무리하는 것이 올바른 응대입니다." },
        { q:"상대방의 말을 정확히 이해했는지 확인하는 방법은?", choices:["그냥 넘어간다","이해한 내용을 요약해 되짚어 말한다","다른 화제로 넘어간다","무시한다"], answer:1, explain:"들은 내용을 요약해 확인하는 것이 효과적입니다." },
        { q:"다음 중 문서 작성 시 피해야 할 표현은?", choices:["명확한 수치 제시","모호하고 추상적인 표현","핵심 요점 강조","간결한 문장"], answer:1, explain:"업무 문서에서는 모호한 표현을 피해야 합니다." },
        { q:"회사에서 손님을 맞이할 때 가장 적절한 인사말은?", choices:["어서오세요, 무엇을 도와드릴까요?","왜 오셨어요?","용건이 뭔가요?","잠깐만요"], answer:0, explain:"친절하고 정중한 환영 인사가 적절합니다." }

      "심화":[
        { q:"업무 보고 시 가장 바람직한 구성 방식은?", choices:["배경을 길게 설명한 뒤 결론은 마지막에","결론을 먼저 말하고 근거를 이어서 제시","결론 없이 사실만 나열","상대가 결론을 유추하도록 함"], answer:1, explain:"두괄식(결론 우선) 구성이 효과적입니다." },
        { q:"다음 중 문서의 목적 파악이 중요한 이유는?", choices:["문서 분량을 알기 위해서","핵심 정보를 빠르게 추리기 위해서","글씨체를 확인하기 위해서","발신자를 알기 위해서"], answer:1, explain:"목적을 먼저 알아야 핵심 정보를 빠르게 찾을 수 있습니다." },
        { q:"업무 이메일 제목 작성 시 바람직한 방식은?", choices:["제목 없이 발송","'안녕하세요'만 기재","용건이 드러나도록 구체적으로 작성","느낌표를 여러 개 사용"], answer:2, explain:"용건이 드러나도록 구체적으로 작성해야 합니다." },
        { q:"회의록 작성 시 반드시 포함해야 할 요소가 아닌 것은?", choices:["회의 일시와 참석자","논의 안건과 결정 사항","참석자의 개인적 취향","다음 회의 일정"], answer:2, explain:"개인적 취향은 회의록 요소가 아닙니다." },
        { q:"설득력 있는 의사표현 전략으로 적절하지 않은 것은?", choices:["구체적인 근거와 사례 제시","상대방 입장을 고려한 어휘 선택","일방적으로 결론만 반복","논리적인 순서로 전달"], answer:2, explain:"일방적 반복은 설득력을 높이지 못합니다." },
        { q:"기획서와 보고서의 차이로 옳은 것은?", choices:["기획서는 과거 실적, 보고서는 향후 계획","기획서는 향후 계획 제안, 보고서는 진행·결과 보고","둘은 동일한 문서","보고서는 결재가 필요 없다"], answer:1, explain:"기획서는 제안, 보고서는 진행·결과 보고입니다." },
        { q:"경청 중 효과적으로 질문하는 방법은?", choices:["말이 끝나기 전에 끼어든다","요점을 확인하는 질문을 적절한 시점에 한다","질문 없이 침묵한다","관련 없는 화제로 돌린다"], answer:1, explain:"적절한 시점의 확인 질문이 효과적입니다." },
        { q:"비즈니스 문서에서 존대 표현 사용에 대해 옳은 것은?", choices:["누구에게나 반말로 작성해도 된다","상대와 상황에 맞는 존대 표현을 사용해야 한다","존대는 사문서에서만 필요하다","존대 표현은 길수록 좋다"], answer:1, explain:"상황에 맞는 적절한 존대 표현이 필요합니다." },
        { q:"다음 중 업무 지시를 전달할 때 가장 효과적인 방법은?", choices:["구체적인 기한과 결과물을 명시한다","알아서 하라고 한다","기한 없이 지시한다","다른 사람을 통해 간접 전달"], answer:0, explain:"구체적 기한과 결과물 명시가 명확한 지시입니다." },

        { q:"다음 중 이메일 회신 시 예의에 어긋나는 행동은?", choices:["빠른 시일 내 회신","정중한 어투 사용","불필요한 참조자까지 전체 회신","핵심 내용 요약"], answer:2, explain:"불필요한 참조자 포함은 예의에 어긋날 수 있습니다." },
        { q:"발표 자료 작성 시 청중을 고려한 구성으로 옳은 것은?", choices:["전문용어를 남발한다","청중 이해 수준에 맞게 설명한다","슬라이드를 글자로 가득 채운다","순서 없이 나열한다"], answer:1, explain:"청중 수준에 맞춘 설명이 효과적입니다." }
      ],
      "변형문제":[
        { q:"[안내문] '신청 기간은 7월 1~15일이며, 서류는 이메일로만 접수합니다.' 옳은 것은?", choices:["방문 접수도 가능하다","이메일 접수만 인정된다","신청 기간에 제한이 없다","서류는 우편으로도 가능하다"], answer:1, explain:"'이메일로만 접수'라고 명시되어 있습니다." },
        { q:"[보도자료] '정책은 내년 1월 시행, 소상공인을 우선 지원 대상으로 한다.' 알 수 없는 것은?", choices:["시행 시기","우선 지원 대상","지원 금액의 구체적 액수","정책의 존재 여부"], answer:2, explain:"구체적 지원 금액은 언급되지 않았습니다." },
        { q:"[공고문] '서류전형(50%)과 면접전형(50%), 서류합격자에 한해 면접 안내를 개별 통보.' 옳은 것은?", choices:["서류전형 없이 면접만","불합격자에게도 면접 안내","서류합격자만 면접 안내를 받음","면접 비중이 더 크다"], answer:2, explain:"서류전형 합격자에 한해 개별 통보한다고 명시되어 있습니다." },
        { q:"[이메일] '견적서 검토 후 이번 주 금요일까지 회신 부탁드립니다.' 요청 사항으로 옳은 것은?", choices:["견적서를 무시해도 된다","금요일까지 회신을 요청하고 있다","다음 주까지 조치 불필요","견적서 재작성 요청"], answer:1, explain:"금요일까지 회신을 요청하고 있습니다." },
        { q:"[회의록] '2안건: 신입사원 교육 일정 조정, 담당자 김OO, 다음 회의까지 초안 제출.' 알 수 있는 것은?", choices:["교육 일정 확정","김OO가 초안 제출 예정","교육 취소","다음 회의 무기한 연기"], answer:1, explain:"담당자와 제출 기한이 명시되어 있습니다." },
        { q:"[안내문] '지원 자격은 만 18~34세, 재학생은 지원 불가.' 지원 가능한 사람은?", choices:["만 20세 재학생","만 25세 졸업생","만 17세 졸업생","만 40세 졸업생"], answer:1, explain:"재학생 제외, 18~34세 조건을 만족해야 합니다." },
        { q:"[뉴스] 'A지역 대중교통 요금 100원 인상, 만 65세 이상은 기존 요금 유지.' 옳은 것은?", choices:["모든 연령 동일 인상","만 65세 이상은 인상 대상 제외","다음 달부터 적용","다른 지역도 함께 인상"], answer:1, explain:"만 65세 이상은 기존 요금을 유지합니다." },
        { q:"[안내서] '반품은 수령 후 7일 이내, 훼손 없는 경우에 한해 가능.' 반품 가능한 경우는?", choices:["10일 후 훼손 없는 제품","5일 후 훼손 없는 제품","3일 후 훼손된 제품","7일 후 훼손된 제품"], answer:1, explain:"7일 이내이면서 훼손 없어야 합니다." },
        { q:"[안내문] '본 행사는 사전 신청자에 한해 참석 가능, 현장 접수 불가.' 옳은 것은?", choices:["현장 신청 가능","사전 신청자만 참석 가능","누구나 참석 가능","신청 불필요"], answer:1, explain:"현장 접수가 불가하므로 사전 신청자만 참석 가능합니다." },
        { q:"[문자] '내일 오전 9시 방문을 오후 2시로 변경 요청드립니다.' 메시지 목적은?", choices:["방문 취소","방문 시간 변경","방문 장소 변경","방문 인원 증가"], answer:1, explain:"방문 시간을 오후 2시로 변경 요청하고 있습니다." },
        { q:"[공지] '전 직원은 금요일까지 개인정보 보호 교육을 이수해야 하며, 미이수 시 재공지.' 옳은 것은?", choices:["교육은 선택사항","금요일까지 이수해야 함","오프라인만 가능","미이수해도 불이익 없음"], answer:1, explain:"금요일까지 이수해야 한다고 명시되어 있습니다." },
        { q:"[안내문] '주차는 방문 차량 2시간 무료, 초과 시 요금 부과.' 옳은 것은?", choices:["방문 차량은 항상 무료","2시간 초과 시 요금 부과","방문 차량 주차 불가","시간 제한 없음"], answer:1, explain:"2시간 초과 시 요금이 부과됩니다." },
        { q:"[기출] 다음 글을 통해 알 수 있는 내용이 아닌 것은?\n스마트공장이란 모든 공정과 생산품, 생산요소들이 디지털화되고 서로 네트워킹하는 공장이다. 이는 단순한 자동화를 뛰어넘는 개념으로, 공정 간 정보 공유를 통해 비효율이 개선되고 수급 변화에 유연하게 대처할 수 있다. 1,000여 개 국내 제조 공장을 대상으로 스마트화 수준과 생산성 지표 간 관계를 추정한 결과, 스마트화 수준의 향상은 1일 생산량, 리드타임, 제품불량률 개선에는 효과가 있었고 생산 품목 수와 판매 거래처 증가에도 긍정적이었다. 그러나 스마트화 수준의 향상은 공장 전반의 생산성 향상과는 통계적으로 유의한 관계를 보이지 않았다.", choices:["스마트공장의 개념","스마트공장의 지향점","스마트화 수준 향상의 긍정적 의미","스마트공장 관련 구체적 기술"], answer:3, explain:"[2024년 NCS 기출] 지문은 스마트공장의 개념과 스마트화 수준 향상의 효과를 설명할 뿐, 구체적인 관련 기술은 언급하지 않습니다." },
        { q:"[기출] 다음 글의 내용과 일치하지 않는 것은?\n기업지배구조란 공공의 이익과 부합하는 범위 내에서 이해관계자들의 이익을 지속적으로 보호하기 위해 기업을 지도하고 통제하는 시스템을 의미한다. 이것은 회사의 목표 설정, 목표 달성 수단, 성과 모니터링에 필요한 구조를 제공하고, 권한 및 책임의 분배와 의사결정 방식을 결정한다. 좋은 기업지배구조는 시장의 신뢰와 기업의 완결성을 얻기 위한 필수적 수단이다. G20/OECD는 2015년 11월 기업지배구조원칙을 개정하였고, 이 원칙은 국제적 기준으로 그 유효성이 입증되어 많은 국가에서 지배구조 개혁의 기본 자료로 활용되고 있다.", choices:["기업지배구조를 통해서 기업을 통제할 수 있다.","좋은 기업지배구조가 없다면 기업의 완결성을 얻을 수 없다.","2015년 11월 이전에는 기업지배구조원칙이 존재하지 않았다.","기업지배구조원칙은 기업의 이익창출과 관련이 있다."], answer:2, explain:"[2024년 NCS 기출] 지문은 2015년에 '개정'하였다고 했으므로, 그 이전에도 원칙이 존재했음을 알 수 있습니다." },
        { q:"[기출] 다음 제시문을 읽고, 이해한 내용으로 옳지 않은 것은?\n캡차(CAPTCHA)는 사용자가 실제 사람인지 컴퓨터 프로그램인지 구별하기 위해 사용되는 방법으로, 사람은 구별할 수 있지만 컴퓨터는 구별하기 힘들게 의도적으로 비틀거나 덧칠한 그림을 주고 그 내용을 물어본다. 컴퓨터가 변형시킨 이미지는 사람이 쉽게 인식할 수 있지만 컴퓨터 프로그램은 인식하지 못하므로, 테스트를 통과하지 못하면 사람이 아님을 판정할 수 있다. 그런데 캡차가 널리 활용되자 대량의 광고 정보를 발송하려는 업체들은 캡차를 대량으로, 그러나 수동으로 풀기 위한 '캡차공장'이라는 새로운 일자리를 만들었다. 저임금 노동이 존재하는 나라들에서 노동자들이 하루 종일 캡차 문자를 입력해 해결하고 있다.", choices:["캡차는 컴퓨터 프로그램이 구별하기 어려운 그림을 제시한다.","자동가입방지 프로그램을 도입하려는 웹사이트 관리자는 캡차를 활용할 수 있다.","저임금 노동자들은 '캡차공장'에서 캡차를 풀어내는 프로그램을 개발한다.","캡차가 정상적으로 작동하였다면, 캡차가 제시한 변형된 이미지는 사람이 인식할 수 있는 정도일 것이다."], answer:2, explain:"[2024년 NCS 기출] 캡차공장 노동자들은 프로그램을 개발하는 것이 아니라 수동으로 캡차를 직접 입력해 풉니다." },
        { q:"[기출] 다음 제시문을 읽고, 이해한 내용으로 옳지 않은 것은?\n크리스퍼 유전자가위는 유전자의 특정 부위를 절단해 유전체 교정을 가능하게 하는 RNA 기반의 인공 제한효소로, 목표 염기서열을 찾아가는 작은 RNA와 실제 DNA를 절단하는 Cas9 단백질로 구성된다. 유전자가위가 잘못 작동해 비표적 위치를 자를 수 있다는 우려 때문에 정확성 확보가 큰 과제였는데, 연구단은 오작동 여부를 효과적으로 측정하는 '멀티플렉스 다이지놈 시퀀싱' 분석법을 개발했다. 이 분석법은 여러 크리스퍼 유전자가위가 각각 목표 유전자만 제대로 교정했는지 정확하게 분석하고, 비표적 위치들을 점수화해 보여줄 수 있다.", choices:["크리스퍼 유전자가위를 활용해 유전병을 치료할 때, 비표적 위치를 자르지 않아야 한다.","'멀티플렉스 다이지놈 시퀀싱' 분석법으로 정교한 유전자가위를 만드는 가이드라인을 제시할 수 있다.","목표 염기서열을 찾아가는 RNA가 잘못된 서열을 찾아갔을 경우, 분석법 점수에 영향을 미친다.","Cas9 단백질에 이상이 생긴 유전자가위는 목표 염기서열을 잘 찾지 못하나 DNA 절단 기능에는 이상이 없을 것이다."], answer:3, explain:"[2024년 NCS 기출] Cas9 단백질은 DNA를 절단하는 역할을 하므로, 이 단백질에 이상이 생기면 절단 기능 자체에 문제가 생깁니다." },
        { q:"[기출] 다음 제시문을 읽고, 이해한 내용으로 옳지 않은 것은?\n과거는 중국과 한국 등에서 시험을 치러 관리를 뽑는 제도로, 중국은 수나라 때, 한국은 고려 때 처음 시작했다. 신라의 최치원이 당나라 과거에 응시하여 합격한 것에서 보이듯, 당나라는 외교관계 개선을 위해 주변 국가 인재들에게도 과거 응시 자격을 주었다. 본격적인 과거 도입은 고려 광종 시기로, 중국에서 귀화한 쌍기가 광종에게 건의하여 실시되었다. 고려 말 성리학이 전래되면서 신진사대부에 의해 모든 관리를 과거로 선발하자는 주장이 거세졌다.", choices:["중국을 통일한 수나라의 군주는 지역 귀족세력을 견제하고자 과거를 시행하였다.","신라의 최치원이 활동하던 시기, 당나라는 자국 인재에게만 과거 응시 자격을 주었다.","고려 광종에게 과거제를 건의한 인물은 중국 출신이다.","고려 말, 새로운 사상의 전래는 관리 선발 제도에 영향을 주었다."], answer:1, explain:"[2024년 NCS 기출] 당나라는 외교관계 개선을 위해 주변 국가의 인재들에게도 과거 응시 자격을 주었으므로, 자국 인재에게만 주었다는 설명은 옳지 않습니다." },
        { q:"[기출/공고문] <OO시 겨울 축제 개장 안내> 1.행사기간: 1.3(금)~1.12(일). 2.행사안내: a.'눈꽃 열차' 무료 운행(매일 10:00~20:00) b.청소년 겨울 생태 특강(매주 토요일 15:00~17:00) c.얼음 낚시장·캠핑장 상시 개장. 3.유의사항: a.영유아 동반 시 각별한 주의 요망 b.행사본부·입구·캠핑장·얼음낚시장에 관리 요원 배치 c.기온이 영하 7도 이상일 시 얼음 낚시장 출입 제한. 공고문 내용과 일치하지 않는 것은?", choices:["1월 5일 14시에는 '눈꽃 열차'가 운행되고 있을 것이다.","1월 6일 16시에 기온이 영하 4도라면 얼음 낚시장 출입이 제한될 것이다.","1월 11일 16시에는 겨울 생태 특강이 진행되고 있을 것이다.","영유아 동반 관람객이 얼음 낚시장에서 아이를 잃어버렸다면 행사 본부로 가야만 관리 요원을 만날 수 있을 것이다."], answer:3, explain:"[2024년 NCS 기출] 얼음 낚시장에도 관리 요원이 배치되어 있으므로, 반드시 행사 본부까지 가야만 관리 요원을 만날 수 있는 것은 아닙니다." },
        { q:"[기출/안내문] <청년멘토 활동 사항> 활동내용: 초·중·고 학생단체 관람예절 교육 및 전시해설. 지원대상: 청년멘토 활동에 관심 있는 대학 졸업자 및 일반인(만 30세 이하). 참가조건: 기본교육·심화교육·전시해설 테스트 필수 이수 후 상반기 활동기간 중 10주 이상, 주1회 활동. 이 안내문을 읽고 추론할 수 있는 내용으로 가장 적절하지 않은 것은?", choices:["고등학생은 청년멘토 지원이 불가하다.","청년멘토과정을 이수하기 위해선 상반기 활동기간 중에 매주 활동하여야 한다.","만 30세에 대학에 입학한 4학년 A씨는 지원이 불가하다.","청년멘토들은 학생들에게 관람예절교육과 심화교육을 진행하게 된다."], answer:3, explain:"[2024년 NCS 기출] 심화교육은 멘토 본인이 사전에 이수해야 하는 교육이지, 멘토가 학생들에게 진행하는 활동이 아닙니다. 멘토의 실제 활동 내용은 관람예절 교육과 전시해설입니다." }
      ]
    },

    listening:{

      "심화":[

        { script:"고객센터입니다. 문의하신 주문번호 12345는 현재 배송 중이며, 내일 오후 도착 예정입니다.", q:"주문번호 12345의 현재 상태는?", choices:["주문 접수","배송 준비 중","배송 중","배송 완료"], answer:2, explain:"'현재 배송 중'이라고 밝히고 있습니다." },
        { script:"고객 여러분께 안내드립니다. 3층 화장실 공사로 금일 오후 1시부터 5시까지 이용이 제한됩니다. 2층 화장실을 이용해 주십시오.", q:"이용 제한 시설은?", choices:["2층 화장실","3층 화장실","1층 로비","전체 층 화장실"], answer:1, explain:"3층 화장실이 이용 제한됩니다." }

      "변형문제":[

        { script:"오늘 오후 6시 이후에는 사전 예약자에 한해 3층 특별전시관 무료 관람이 가능합니다. 예약하지 않으신 고객께서는 현장 발권 후 입장해 주시기 바랍니다.", q:"예약하지 않은 고객이 관람하려면?", choices:["관람 불가","무료로 바로 입장","현장 발권 후 입장","직원 동행 시에만 가능"], answer:2, explain:"현장 발권 후 입장할 수 있다고 안내하고 있습니다." }

        { q:"[사례] 팀원 두 명이 업무 분담 문제로 반복적으로 다투고 있다. 팀장이 취할 가장 적절한 조치는?", choices:["둘을 방치한다","각자의 입장을 듣고 명확한 역할 기준을 재정립한다","한 명을 즉시 교체한다","둘 다 징계한다"], answer:1, explain:"입장 청취 후 역할 기준 재정립이 적절합니다." },
        { q:"[기출] A씨는 입사 후 빠른 조직 적응력으로 뛰어난 업무성과를 보이고 있다. 그러나 A씨와 함께 입사한 동기들은 조직에 잘 적응하지 못하고 업무 실수가 잦다. A씨는 동기들의 부진한 수행결과가 자신에게도 영향을 미칠 것이라 걱정하고 있다. 다음 중 A씨의 행동으로 가장 적절한 것은?", choices:["동기들이 당면한 문제가 무엇인지 경청하고 적절한 도움을 구할 수 있도록 조언한다.","타인의 문제이므로 자신에게 영향이 없을 것이라 믿고 자신의 수행에 집중한다.","동기들에게 외부 채용 정보를 공유함으로써 간접적으로 이직을 권유한다.","다른 구성원들에게 동기들의 무능을 알림으로써 자신을 차별화한다."], answer:0, explain:"[2024년 NCS 기출] 동기들이 적절한 도움을 구할 수 있도록 돕는 것이 조직 발전과 자신의 불안 해소에 모두 도움이 되는 건설적인 방법입니다." },
        { q:"[기출] 고객의 소리 게시판 담당 A대리는 신원미상의 인물로부터, 자신의 게시글에 접속할 수 없으니 게시물 내용과 관련 정보를 확인해 달라는 전화를 받았다. 그러나 해당 게시판은 본인인증 후에만 게시물 관리가 가능하므로 개인정보보호를 위해 본인확인을 거쳐야만 답할 수 있다. A대리의 민원응대 방법으로 가장 적절한 것은?", choices:["규정에 의해 응답할 수 없거나 응답해서는 안되는 질문이므로 요청을 무시한다.","상사나 다른 조직원에게 업무를 넘김으로써 문제가 될 수 있는 상황을 피한다.","응답 할 수 없는 이유에 대하여 설명하고 해당 민원을 해결할 방법을 안내한다.","요청을 들어주지 않으면 민원발생의 원인이 되므로 즉시 원하는 정보를 알려준다."], answer:2, explain:"[2024년 NCS 기출] 응답할 수 없는 이유를 설명하고 해결 방법을 안내하는 것이 적절한 민원 응대입니다." },
        { q:"[기출] 다음 중 각 유형별 갈등해결법에 대한 설명으로 적절하지 않은 것은?", choices:["통합형 갈등해결법: 회피형과 타협형 갈등해결법을 함께 사용함으로써 갈등초기 협상을 거부하다가 상대방이 양보를 하면 갈등을 해결하려 한다.","회피형 갈등해결법: 갈등 상황이 나아질 때까지 문제를 덮어두거나 위험을 피하려 한다.","경쟁형 갈등해결법: 상대의 입장을 고려하지 않은 채 자신의 입장만을 강조하여 문제를 해결하려 한다.","수용형 갈등해결법: 자신의 입장은 고려하지 않은 채 상대의 입장만을 고려하여 문제를 해결하려 한다."], answer:0, explain:"[2024년 NCS 기출] 통합형은 서로의 입장을 모두 고려해 모두의 목표 달성이 가능하도록 하는 방법으로, 회피형·타협형을 함께 사용한다는 설명은 옳지 않습니다." },
        { q:"[기출] 다음 중 고객불만 처리절차에 대한 설명으로 바르게 짝지어지지 않은 것은?", choices:["경청: 선입견을 버리고 문제를 파악하기 위해 고객의 항의를 듣는다.","감사와 공감표시: 불만 해결의 기회를 준 것에 감사하며 고객의 항의에 공감을 표시한다.","처리확인: 불만처리 후 처리 결과에 대해 고객이 만족하는지 확인한다.","피드백: 문제의 원인이 된 구성원을 질책함으로써 고객의 불만을 잠재운다."], answer:3, explain:"[2024년 NCS 기출] 피드백은 문제를 장기적으로 개선하기 위한 활동이며, 구성원 질책이 목적이 아닙니다." },
        { q:"[기출] 조직 내 대인관계는 보통 공식적 대인관계와 비공식적 대인관계로 이루어진다. 전자는 업무를 중심으로, 후자는 사교를 중심으로 이루어지는 관계이다. 조직 내 모든 구성원들은 이 두 관계를 함께 맺으며, 둘 중 하나도 맺지 못한 구성원은 어떠한 형태로든 조직생활에서 장애를 겪을 확률이 매우 높다. 다음 중 이 '장애'에 포함되지 않는 것은?", choices:["근로의욕 저하","일과 삶의 균형","조직 부적응","팀워크 붕괴"], answer:1, explain:"[2024년 NCS 기출] '일과 삶의 균형'은 대인관계 결핍으로 인한 조직 내 장애의 예로 보기 어렵습니다." },
        { q:"[기출] 위 지문의 공식적 대인관계와 비공식적 대인관계 각각에 대한 설명으로 적절하지 않은 것은?", choices:["공식적 대인관계는 개인적인 사정보다는 일의 절차나 방법이 정당하고 능률적인가를 중요시한다.","공식적 대인관계는 조직에서 정한 규정에 따라 이루어진 관계로서 조직 목표 달성에 필수적이다.","비공식적 대인관계는 군대와 같은 top-down 방식의 조직에서는 가급적 지양해야 한다.","비공식적 대인관계는 동료의식을 통해 팀 성과를 창출하는데 도움이 된다."], answer:2, explain:"[2024년 NCS 기출] 비공식적 대인관계도 top-down 조직에서 배제해야 하는 것은 아니며, 팀워크 형성에 기여할 수 있습니다." },
        { q:"[기출] 다음 중 인간관계를 형성하고 유지함에 있어 가장 중요한 것은?", choices:["행동규범","외면적 행동특성","인간관계 기법에 대한 지식","자신의 사람됨과 내면의 깊이"], answer:3, explain:"[2024년 NCS 기출] 인간관계는 기법보다 자신의 사람됨과 내면의 깊이에서 비롯됩니다." },
        { q:"[기출] 직장생활에 있어 대인관계에 해당하지 않는 것은?", choices:["직장 내 협조적 관계 유지","가족 구성원의 고민해결","고객의 요구 충족","조직내부의 갈등해결"], answer:1, explain:"[2024년 NCS 기출] 가족 구성원의 고민 해결은 직장 내 대인관계의 범주에 해당하지 않습니다." },
        { q:"[기출] 다음은 동기부여에 대한 설명이다. 적절하지 않은 것은?", choices:["조직구성원들에게 지속적으로 동기를 부여하기 위해 가장 효과적인 방법은 금전적 보상이나 편익, 승진과 같은 외적 동기유발이다.","목표달성을 높이 평가하여 조직구성원에게 즉각 보상하는 행위를 긍정적 강화라고 한다.","공포감 조성은 단기적인 관점에서 보면 조직구성원들의 적극성을 이끌어 낼 수도 있지만, 장기적으로는 해가 될 수도 있다.","조직구성원 스스로 조직의 일원임을 느낄 수 있도록 일깨워 주는 것이 좋다."], answer:0, explain:"[2024년 NCS 기출] 외적 동기유발은 단기적 효과에 그치기 쉬워 지속적인 동기부여의 가장 효과적인 방법이라 보기 어렵습니다." },
        { q:"[기출] 지속적으로 자신의 사회경제적 지위 혹은 해당 업종에 대한 지식을 과시하며 책임자를 불러달라고 요구하는 불만 고객의 유형은?", choices:["거만형 불만고객","의심형 불만고객","트집형 불만고객","조급형 불만고객"], answer:0, explain:"[2024년 NCS 기출] 자신의 지위나 지식을 과시하는 유형은 거만형 불만고객입니다." },
        { q:"[기출] 효과적인 팀이란 팀원들의 강점을 잘 인식하고 활용하여 목표를 달성하는 팀을 말한다. 다음 중 효과적인 팀의 핵심적인 특징을 잘못 설명한 것은?", choices:["팀의 리더만 리더십을 발휘해야 한다.","팀원의 역할과 책임을 명료화 한다.","내부갈등을 건설적으로 해결한다.","결과에 초점을 맞춘다."], answer:0, explain:"[2024년 NCS 기출] 효과적인 팀은 리더십 역량을 구성원들이 함께 공유합니다." },
        { q:"[기출] 대인관계능력 향상을 위한 실천방안으로 적합하지 않은 것은?", choices:["상대방이 나에 대한 기대를 갖지 않도록 행동한다.","상대방에 대한 이해심을 갖도록 훈련한다.","상대방의 사소한 일에 대한 관심을 갖도록 한다.","나의 언행이 일치하도록 노력한다."], answer:0, explain:"[2024년 NCS 기출] 상대방이 기대를 갖지 않도록 하는 것은 신뢰 형성에 도움이 되지 않습니다." },
        { q:"[기출] 보기 중 대인관계능력에 대한 설명으로 가장 적절한 것은?", choices:["조직에서 협조적인 관계를 형성하고 유지하는 능력","갈등을 피하기 위해 수단과 방법을 가리지 않는 능력","자신에게 도움이 되는 사람만을 분별해 사귀는 능력","고객을 위해 조직 구성원의 이익을 도외시하는 능력"], answer:0, explain:"[2024년 NCS 기출] 대인관계능력은 협조적인 관계를 형성하고 유지하는 능력을 의미합니다." },
        { q:"[기출] 다음은 리더십에 대한 설명이다. 적절하지 않은 것은?", choices:["상사로서 하급자에게 발휘하도록 조직이 부여한 권한","자신의 주장을 소신있게 나타내고 조직구성원을 격려하는 힘","특정 직급뿐 아니라 모든 조직구성원에게 요구되는 역량","조직목표 달성을 위해 개인 또는 집단에 영향력을 행사하는 과정"], answer:0, explain:"[2024년 NCS 기출] 리더십은 조직이 부여한 공식적 권한만을 의미하지 않으며, 모든 구성원에게 요구되는 역량입니다." },
        { q:"[기출] 다음 중 동기부여 방법으로 가장 적절하지 않은 것은?", choices:["조직원의 목표달성에 대하여 즉각적인 보상을 제공한다.","환경 변화에 따라 조직원들에게 새롭고 도전적인 업무를 맡긴다.","조직원의 실수를 여러 번에 걸쳐 처벌하여 전문성이 부족함을 상기시킨다.","지속적인 교육을 통해 조직원들의 성장과 역량 활용을 도모한다."], answer:2, explain:"[2024년 NCS 기출] 반복적인 처벌은 동기부여가 아니라 사기 저하를 초래할 수 있습니다." },
        { q:"[기출] 고객만족 조사에 대한 설명으로 가장 적절한 것은?", choices:["모든 고객은 자신의 욕구를 정확히 파악하고 있다고 가정해야 한다.","모든 고객이 동일한 수준의 서비스를 기대하고 있다고 가정해야 한다.","고객만족 조사를 실시하기 전 조사의 분야와 대상이 정확히 정의되어야 한다.","고객만족도 조사 시 기업의 성과를 보여주는 방향으로 질문을 구성해야 한다."], answer:2, explain:"[2024년 NCS 기출] 조사를 시작하기 전 조사 분야와 대상을 명확히 정의해야 합니다." },
        { q:"[기출] 팀워크란 팀 구성원이 공동의 목적을 달성하기 위해 상호관계성을 가지고 협력하여 업무를 수행하는 것을 의미한다. 팀워크는 보통 세 가지 기제로 구분된다. 다음 중 옳게 짝지어진 것은?", choices:["협력, 통제, 자율","협력, 응집력, 일관성","책임, 통제, 일관성","책임, 응집력, 자율"], answer:0, explain:"[2024년 NCS 기출] 팀워크의 유형은 협력, 통제, 자율의 세 가지 기제로 구분됩니다." },
        { q:"[기출] '사람들로 하여금 집단에 머물도록 느끼게 만들고, 그 집단의 구성원으로 계속 남아 있기 원하도록 만드는 힘'을 무엇이라고 하는가?", choices:["팀워크","응집력","사교성","일체화"], answer:1, explain:"[2024년 NCS 기출] 이는 응집력에 대한 정의입니다." },
        { q:"[기출] 다음 중 팀워크에 대한 설명으로 타당하지 않은 것은?", choices:["팀 구성원이 공동의 목적달성을 위해 상호 관계성을 가지고 협력하는 일을 하는 것을 의미한다.","사람들로 하여금 집단에 머물도록 느끼게 하고, 그 집단의 멤버로서 계속 남아 있기를 원하게 만드는 힘을 의미한다.","팀워크의 유형은 보통 협력, 통제, 자율을 통해 구분된다.","효과적인 팀워크를 형성하기 위해서는 명확한 팀 비전과 공동의 목표를 공유해야 한다."], answer:1, explain:"[2024년 NCS 기출] 두 번째 설명은 응집력에 대한 정의이며, 팀워크 자체에 대한 설명이 아닙니다." },
        { q:"[기출] 다음은 코칭에 대한 설명이다. 적절하지 않은 것은?", choices:["다른 사람을 지도하는 측면보다 이끌어 주고 영향을 미치는데 중점을 둔다.","직원들이 업무를 수월하게 진행하고 성과에 대해 제대로 보상받을 수 있게 돕는 커뮤니케이션 수단이다.","모든 사람을 팀에 관여하도록 하고, 프로젝트 또는 업무를 훌륭히 수행하는데 기여한다.","명령을 내리거나 지시하는 것보다 적은 시간이 걸린다."], answer:3, explain:"[2024년 NCS 기출] 코칭은 명령이나 지시보다 많은 시간과 인내가 필요한 활동입니다." },
        { q:"[기출] 협상에 대한 설명의 빈칸에 들어갈 말로 바르게 짝지어진 것은? '협상이란 (   )관계에 있는 이해당사자들이 대화를 통해 (   )을/를 해결하고자 하는 (   )이다.'", choices:["위계 - 위계 - 리더십","통제 - 통제 - 권한위임","협력 - 협력 - 동기부여","갈등 - 갈등 - 상호작용"], answer:3, explain:"[2024년 NCS 기출] 협상이란 갈등 관계의 이해당사자들이 대화로 갈등을 해결하고자 하는 상호작용입니다." },
        { q:"[기출] 직원의 설명을 잘 믿지 않고 제품과 서비스의 질을 신뢰하지 못하는 고객 불만 유형은?", choices:["거만형","의심형","트집형","빨리빨리형"], answer:1, explain:"[2024년 NCS 기출] 직원의 설명이나 품질을 믿지 못하는 유형은 의심형입니다." },
        { q:"[기출] 멤버십 유형을 나누는 두 가지 축이 올바르게 짝지어진 것은?", choices:["사고의 혁신성 – 행동의 이타성","사고의 혁신성 – 행동의 적극성","사고의 독립성 – 행동의 이타성","사고의 독립성 – 행동의 적극성"], answer:3, explain:"[2024년 NCS 기출] 멤버십 유형은 사고의 독립성과 행동의 적극성을 두 축으로 구분합니다." },
        { q:"[기출] 다음 중 팀워크를 촉진하기 위한 방안으로 가장 적절하지 않은 것은?", choices:["창의적인 의견을 낼 수 있는 환경을 조성한다.","의사결정 과정에 적극적으로 참여한다.","진솔한 대화를 통해 팀원들간 신뢰를 형성한다.","모든 갈등은 드러내지 않고 숨겨둔다."], answer:3, explain:"[2024년 NCS 기출] 팀워크 촉진을 위해서는 갈등을 숨기지 않고 건설적으로 해결해야 합니다." },
        { q:"[기출] N 회사에서는 한 직원으로 인해 골머리를 앓고 있다. 그는 회의시간마다 언제나 비판적인 의견만 제시하고, 다른 사원의 의견에는 보완점 없이 부정적으로만 반응하며 자신의 의견은 제시하지 않는다. 상급자의 행동에는 늘 불만을 토로하지만 정작 자신도 같은 행동을 하며, 직원들과 담소를 나누거나 회식하는 자리에는 끼지 않는다. 이 직원의 행동에 해당하는 멤버십 유형은?", choices:["소외형","순응형","실무형","수동형"], answer:0, explain:"[2024년 NCS 기출] 비판적이고 냉소적이며 조직 활동에 거리를 두는 모습은 소외형 멤버십의 특징입니다." },
        { q:"[기출] A는 입사한지 6개월 된 H회사의 신입사원이다. A는 회사에서 주어지는 업무 내용, 직장 상사, 속한 조직 모두가 만족스럽다. A는 개인적인 시간을 희생하면서까지도 조직에 헌신한다. A에게 가장 중요한 가치는 기존 질서를 따르는 것이며, 가장 어려운 것은 리더의 의견을 거스르는 것이다. A가 해당하는 멤버십의 유형은?", choices:["소외형","순응형","실무형","수동형"], answer:1, explain:"[2024년 NCS 기출] 기존 질서를 따르고 리더에게 헌신하는 모습은 순응형 멤버십의 특징입니다." },
        { q:"[기출] 다음 자료가 설명하는 리더십 유형으로 옳은 것은? 조직구성원들로 하여금 리더에 대한 신뢰를 갖게 하는 카리스마는 물론, 조직변화의 필요성을 감지하고 그러한 변화를 이끌어 낼 수 있는 새로운 비전을 제시할 수 있는 능력이 요구되는 리더십으로 전통적인 거래적 리더십과 많은 차이가 있다.", choices:["독재자 유형","변혁적 유형","민주주의에 근접한 유형","파트너십 유형"], answer:1, explain:"[2024년 NCS 기출] 카리스마와 비전 제시 능력이 강조되는 것은 변혁적 리더십입니다." },
        { q:"[기출] 헤르만 헤세의 '동방순례'에 등장하는 레오는 순례단의 궂은 일을 도맡아 하는 하인과 같은 존재로 구성원 중 가장 낮은 위치에 있었다. 여행 도중 레오가 사라지자 순례단은 혼란에 빠져 결국 여행을 중단하게 된다. 몇 년 후 찾은 레오는 사실 순례단을 후원한 교단의 가장 높은 곳에 위치한 사람이었다. 이 이야기에서 비롯된 리더십의 특징으로 가장 적절한 것은?", choices:["부하의 변화를 통해 동기를 부여하고자 하고 감정과 정서에 호소한다.","타인을 위한 봉사에 초점을 두고 자신보다 구성원들의 이익을 우선시한다.","스스로 자신이 나아가야 할 방향을 설정하고 자기 자신을 통제하면서 자신을 이끌어 간다.","다른 사람이 스스로 자기 자신을 이끌어갈 수 있게 도와준다."], answer:1, explain:"[2024년 NCS 기출] 레오의 이야기는 서번트(섬김) 리더십의 유래로, 구성원의 이익을 우선시하는 봉사 중심 리더십을 설명합니다." },
        { q:"[기출] 갈등에는 감정적 문제와 핵심 문제가 있다. 이 중 감정적 문제가 아닌 것은?", choices:["자존심에 대한 위협","상대방에 대한 대립적 스타일","통제 및 권력을 위한 다툼","각자 역할에 대한 모호성"], answer:3, explain:"[2024년 NCS 기출] 역할에 대한 모호성은 갈등의 핵심(내용적) 문제에 해당합니다." },
        { q:"[기출] 다음 <보기>에서 보여지는 타인 설득 전략으로 알맞은 것은? '가장 많이 팔린…', 'TV 프로그램 1위', '천만 관객이 본…', '백만 권이 팔린…', '이 책을 구매한 분들이 함께 구매한 책입니다'", choices:["상대방 이해 전략","사회적 입증 전략","일관성 전략","호혜성 전략"], answer:1, explain:"[2024년 NCS 기출] 다수의 행동을 근거로 상대를 설득하는 것은 사회적 입증 전략입니다." },
        { q:"[기출] 갑 씨는 하반기에 새로운 온라인 쇼핑몰 사업을 시작하려 한다. 고객을 우선으로 생각하는 것을 회사의 모토로 삼아, 고객서비스에 최선을 다하는 고객중심 업체로 만들려고 할 때 고려해야 할 것으로 가장 적절하지 않은 것은?", choices:["고객 만족에 중심을 두기","고객의 선호나 유형과 관계 없이 모든 고객에게 동일한 서비스를 제공하기","내부고객, 외부고객 모두를 중요하게 여기기","고객들의 피드백을 받고 받아들이는 시스템 구축하기"], answer:1, explain:"[2024년 NCS 기출] 고객마다 선호와 니즈가 다르므로 획일적으로 동일한 서비스만 제공하는 것은 고객중심 경영과 거리가 멉니다." },
        { q:"[기출] SERVICE의 7가지 의미에 해당하는 것으로 옳지 않은 것은?", choices:["전자기기에 익숙하지 않은 노인에게 이해할 수 있도록 친절하게 설명하였다.","찌그러진 자동차 범퍼를 마치 새 차의 범퍼인 것처럼 깨끗하게 수리해 주었다.","인상을 찌푸린 채 퉁명스럽게 응대하였다.","고객에게 '정말 좋은 서비스 센터에요' 라는 이야기를 들었다."], answer:2, explain:"[2024년 NCS 기출] 퉁명스러운 응대는 SERVICE의 의미(정중함 등)에 위배됩니다." }
      ]
    },

        { q:"조직의 비전과 목표를 전 직원과 공유하는 것이 중요한 이유는?", choices:["형식적 절차이기 때문","방향성 일치와 동기부여를 위해","비용 절감을 위해","규정이라서 어쩔 수 없이"], answer:1, explain:"방향성 일치와 동기부여를 위해 중요합니다." },

      "변형문제":[

        { q:"[사례] 해외 지사와의 화상회의에서 문화 차이로 오해 발생. 재발 방지 방안은?", choices:["화상회의를 폐지한다","사전에 상대 문화와 비즈니스 관습을 파악한다","회의를 일방적으로 진행한다","통역 없이 진행한다"], answer:1, explain:"사전 문화 파악이 재발 방지 방안입니다." },
        { q:"[사례] 조직 개편으로 부서명과 업무 범위가 바뀌었으나 안내 부족으로 혼란 발생. 필요한 조치는?", choices:["변경사항을 안내하지 않는다","새로운 조직도와 업무 범위를 명확히 공지한다","이전 체계를 그대로 유지한다","개편을 취소한다"], answer:1, explain:"명확한 공지가 필요한 조치입니다." },
        { q:"[사례] 경영진이 신사업 진출을 검토 중. 결정 전에 분석해야 할 것은?", choices:["직원 개인 취향","시장 환경과 자사의 강약점(SWOT)","사무실 인테리어","주차장 크기"], answer:1, explain:"시장 환경과 SWOT 분석이 필요합니다." },

        { q:"[사례] 타 부서와의 협업 프로젝트에서 보고 라인이 겹쳐 혼선이 발생. 가장 근본적인 해결책은?", choices:["프로젝트를 취소한다","명확한 보고 체계와 책임자를 사전에 정한다","각자 알아서 하게 둔다","한 부서만 참여시킨다"], answer:1, explain:"보고 체계와 책임자를 사전에 정하는 것이 근본 해결책입니다." },
        { q:"[기출] 기업의 사회적 책임(CSR, Corporate Social Responsibility)이란 기업이 전통적인 운영 목표인 이윤 추구를 위한 생산 및 영업 활동을 하면서 동시에 환경 경영, 윤리경영, 사회 공헌과 같이 지역사회와 사회 전체에 이익을 줄 수 있는 활동을 병행하는 것을 말한다. 다음 중 성공적인 CSR 활동이 아닌 것은?", choices:["지역공동체나 소비자들에게 해당 기업에 대해 긍정적인 이미지를 갖게 한다.","CSR 활동을 통해 긍정적인 기업 이미지를 제품이나 서비스에 전이시켜 매출을 향상시킨다.","CSR의 지속적인 활동을 통해서 기업에 더 많은 자금을 유치시킨다.","내부 이해관계자보다는 외부 이해관계자의 의견을 존중하여 사회적 평판을 높인다."], answer:3, explain:"[2024년 NCS 기출] 성공적인 CSR은 내부·외부 이해관계자를 모두 균형 있게 고려해야 하며, 내부 이해관계자를 경시하는 것은 바람직하지 않습니다." },
        { q:"[기출] 다음 지문에서 '이것'은? 이것은 기업이 수익 창출 이후에 사회 공헌 활동을 하는 것이 아니라 기업 활동 자체가 사회적 가치를 창출하면서 동시에 경제적 수익을 추구할 수 있는 방향으로 이루어지는 행위를 말한다. CSR과 유사하지만 가치 창출에서 차이가 있다. 이것은 기업과 지역사회가 상생하는 개념이라 할 수 있다.", choices:["전략적 기업경영","가치중심경영","공유가치경영","윤리경영"], answer:2, explain:"[2024년 NCS 기출] 수익 추구와 사회적 가치 창출을 동시에 이루는 개념은 CSV(공유가치경영, Creating Shared Value)입니다." },
        { q:"[기출] 다음 중 인사 조직의 업무가 아닌 것은?", choices:["성과지표에 따른 성과평가 시스템 구축","보상체계 구축 및 운영","중장기 교육계획 수립","중장기 조직운영 예산 수립"], answer:3, explain:"[2024년 NCS 기출] 중장기 조직운영 예산 수립은 재무·기획 부서의 업무로, 인사 조직의 업무 범위와는 거리가 있습니다." },
        { q:"[기출] 비즈니스 모델 캔버스는 사업타당성을 분석하는 도구로, 핵심파트너·핵심활동·핵심자원·가치상품·고객관계·채널·비용구조·매출구조 등 9가지 사업요소를 블록 형태로 배치한다. 다음 중 비즈니스 모델 캔버스의 사업요소에 대한 설명으로 바르지 않은 것은?", choices:["회사가 고객에게 줄 수 있는 제품과 서비스가 뭉쳐서 하나의 가치로 포장된다.","채널을 통해 소통과 유통, 영업 등이 이루어지게 된다.","핵심 파트너는 비즈니스 모델을 동작시키는 협력대상을 말하는데 경쟁자도 포함된다.","비용구조는 고객이 어떤 경우에 비용을 지불할 것인가를 대표하는 빌딩 블록이다."], answer:3, explain:"[2024년 NCS 기출] 고객이 비용을 지불하는 경우를 나타내는 것은 '매출구조'이며, '비용구조'는 회사가 지출하는 비용에 대한 설명입니다." },
        { q:"[기출] 위와 같은 비즈니스 모델 캔버스에서 '고객관계' 블록에 해당되는 내용으로 가장 적절한 것은?", choices:["비즈니스 모델을 동작시키기 위해 회사에서 반드시 수행해야 하는 일들.","물리적, 자본, 지적 재산, 그리고 사람 등이 될 수 있다.","같은 서비스나 제품도 고객에 따라 다르게 반응할 수 있어 제대로 분석, 분류해야 한다.","고객과 가치상품을 전달하는 역할을 수행한다."], answer:2, explain:"[2024년 NCS 기출] 고객에 따라 반응이 다를 수 있어 이를 분석·분류해야 한다는 설명은 '고객관계' 블록에 해당합니다." },
        { q:"[기출] 다음 중 B2C 시장과 B2B 시장에 대한 비교 설명으로 올바르지 않은 것은?", choices:["시장 세분화에 있어서 B2C 시장은 개인의 생활 방식으로, B2B 시장은 사업의 특성 및 기업의 특성으로 구분한다.","제품 정책에 있어서는 B2C 시장이 표준화 및 감성적 특성을 강조하는 반면 B2B는 고객 맞춤화, 기능구현 및 기술개발에 중점을 둔다.","판매촉진 방식에 있어서 B2C는 교육, 세미나, 전시회를 주로 활용하는 반면 B2B는 매체광고나 캠페인에 주력한다.","가격 정책에 있어서 B2C는 표준화된 가격 또는 할인가격 정책을 주로 사용하지만, B2B는 입찰, 협상, 경쟁을 통해 유동적인 가격 정책을 사용한다."], answer:2, explain:"[2024년 NCS 기출] 실제로는 반대로, B2C가 매체광고·캠페인을 주로 활용하고 B2B가 교육·세미나·전시회를 주로 활용합니다." },
        { q:"[기출] 맥킨지 7S 모델의 조직문화 구성요소 중 조직 운영의 의사 결정과 일상 운영의 틀이 되는 것은?", choices:["공유가치(Shared value)","시스템(System)","기술(Skill)","스타일(Style)"], answer:1, explain:"[2024년 NCS 기출] 의사 결정과 일상 운영의 틀이 되는 요소는 시스템(System)입니다." }

      "심화":[{ title:"준법정신과 책임의 의미", youtubeId:"", searchQuery:"NCS 직업윤리 준법정신" }],

const LEVELS = ["기초", "심화", "변형문제"];

let currentStudent = null;
let currentAreaId = NCS_DATA.areas[0].id;
let currentSubtab = "이론";
let currentLevel = "기초";
let quizMode = "practice";
let quizState = null;
let listeningState = null;
let progressData = {};
let customQuestions = {};
let isTeacherAuthed = false;
let liveUnsub = null;
let liveInterval = null;
let pdfParsedDrafts = [];

function getArea(id){ return NCS_DATA.areas.find(a => a.id === id); }
function getQuestionsFor(area, level){
  const built = (area.questions && area.questions[level]) || [];
  const custom = (customQuestions[area.id] && customQuestions[area.id][level]) || [];
  return [...built, ...custom];
}
function hasCustomContent(areaId){
  const c = customQuestions[areaId];
  if (!c) return false;
  return Object.values(c).some(arr => arr && arr.length > 0);
}

/* ---------- Firestore / localStorage helpers ---------- */
async function loadProgress(studentId){
  if (db){
    const snap = await db.getDoc(db.doc(db._db, "students", studentId));
    return snap.exists() ? (snap.data().progress || {}) : {};
  }
  const raw = localStorage.getItem("ncs_progress_" + studentId);
  return raw ? JSON.parse(raw) : {};
}
async function saveProgress(studentId, name, progress){
  if (db){
    await db.setDoc(db.doc(db._db, "students", studentId), { name, progress, updatedAt: Date.now() }, { merge:true });
  } else {
    localStorage.setItem("ncs_progress_" + studentId, JSON.stringify(progress));
    const meta = JSON.parse(localStorage.getItem("ncs_students_local") || "{}");
    meta[studentId] = { name };
    localStorage.setItem("ncs_students_local", JSON.stringify(meta));
  }
}
async function getStudentDoc(studentId){
  if (db){
    const snap = await db.getDoc(db.doc(db._db, "students", studentId));
    return snap.exists() ? snap.data() : null;
  }
  const raw = localStorage.getItem("ncs_student_" + studentId);
  return raw ? JSON.parse(raw) : null;
}
async function setStudentAuth(studentId, name, pinHash){
  if (db){
    await db.setDoc(db.doc(db._db, "students", studentId), { name, pinHash }, { merge:true });
  } else {
    const existing = JSON.parse(localStorage.getItem("ncs_student_" + studentId) || "{}");
    localStorage.setItem("ncs_student_" + studentId, JSON.stringify({ ...existing, name, pinHash }));
  }
}
async function loadAllStudents(){
  if (db){
    const snap = await db.getDocs(db.collection(db._db, "students"));
    const rows = []; snap.forEach(d => rows.push({ id:d.id, ...d.data() })); return rows;
  }
  const meta = JSON.parse(localStorage.getItem("ncs_students_local") || "{}");
  return Object.keys(meta).map(id => {
    const authInfo = JSON.parse(localStorage.getItem("ncs_student_" + id) || "{}");
    return { id, name: meta[id].name, pinHash: authInfo.pinHash,
      progress: JSON.parse(localStorage.getItem("ncs_progress_" + id) || "{}") };
  });
}
async function resetStudentPinData(studentId){
  if (db){ await db.setDoc(db.doc(db._db, "students", studentId), { pinHash: null }, { merge:true }); }
  else {
    const existing = JSON.parse(localStorage.getItem("ncs_student_" + studentId) || "{}");
    existing.pinHash = null;
    localStorage.setItem("ncs_student_" + studentId, JSON.stringify(existing));
  }
}
async function deleteStudentData(studentId){
  if (db){ await db.deleteDoc(db.doc(db._db, "students", studentId)); }
  else {
    localStorage.removeItem("ncs_progress_" + studentId);
    localStorage.removeItem("ncs_student_" + studentId);
    const meta = JSON.parse(localStorage.getItem("ncs_students_local") || "{}");
    delete meta[studentId];
    localStorage.setItem("ncs_students_local", JSON.stringify(meta));
  }
}
async function loadCustomQuestions(){
  if (db){
    const snap = await db.getDocs(db.collection(db._db, "customQuestions"));
    const out = {};
    snap.forEach(d => {
      const data = d.data();
      if (!out[data.areaId]) out[data.areaId] = {};
      if (!out[data.areaId][data.level]) out[data.areaId][data.level] = [];
      out[data.areaId][data.level].push({ ...data, id:d.id });
    });
    return out;
  }
  const raw = localStorage.getItem("ncs_custom_questions");
  return raw ? JSON.parse(raw) : {};
}
async function addCustomQuestion(areaId, level, item){
  if (db){
    const ref = db.doc(db.collection(db._db, "customQuestions"));
    await db.setDoc(ref, { areaId, level, ...item, createdAt: Date.now() });
  } else {
    const all = JSON.parse(localStorage.getItem("ncs_custom_questions") || "{}");
    if (!all[areaId]) all[areaId] = {};
    if (!all[areaId][level]) all[areaId][level] = [];
    all[areaId][level].push({ ...item, id: "local_" + Date.now() + "_" + Math.random().toString(36).slice(2) });
    localStorage.setItem("ncs_custom_questions", JSON.stringify(all));
  }
  customQuestions = await loadCustomQuestions();
}

/* ---------- 로그인 / 로그아웃 (PIN 인증) ---------- */
window.handleLogin = async function(){
  const id = document.getElementById("loginStudentId").value.trim();
  const name = document.getElementById("loginName").value.trim();
  const pin = document.getElementById("loginPin").value.trim();
  const msg = document.getElementById("loginMsg");
  if (!id){ msg.textContent = "학번을 입력해 주세요."; return; }
  if (!/^\d{4}$/.test(pin)){ msg.textContent = "PIN은 숫자 4자리입니다."; return; }

  const pinHash = await sha256Hex(id + ":" + pin);
  const existing = await getStudentDoc(id);
  if (existing && existing.pinHash){
    if (existing.pinHash !== pinHash){
      msg.textContent = "PIN이 일치하지 않습니다. 선생님께 PIN 초기화를 요청하세요.";
      return;
    }
  } else {
    await setStudentAuth(id, name || (existing && existing.name) || "학생", pinHash);
  }

  currentStudent = { id, name: name || (existing && existing.name) || "학생" };
  progressData = await loadProgress(id);
  msg.textContent = "";
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("studentBar").classList.remove("hidden");
  document.getElementById("studentChip").textContent = `학번 ${id} · ${currentStudent.name}`;
  renderAll();
};
window.handleLogout = function(){
  currentStudent = null; progressData = {};
  document.getElementById("loginView").classList.remove("hidden");
  document.getElementById("studentBar").classList.add("hidden");
  document.getElementById("adminPanel").classList.add("hidden");
  stopLiveDashboard();
};

/* ---------- 진행률 ---------- */
function isLevelUnlocked(areaId, level){
  if (level === "기초") return true;
  const prev = LEVELS[LEVELS.indexOf(level) - 1];
  return !!(progressData[areaId] && progressData[areaId][prev] && progressData[areaId][prev].quizDone);
}
function getLevelProgress(areaId, level){
  return (progressData[areaId] && progressData[areaId][level]) || { theoryDone:false, quizDone:false, score:0 };
}
function overallPercent(){
  let total = 0, done = 0;
  NCS_DATA.areas.forEach(a => {
    LEVELS.forEach(lv => {
      if (getQuestionsFor(a, lv).length > 0){
        total += 1;
        if (progressData[a.id] && progressData[a.id][lv] && progressData[a.id][lv].quizDone) done += 1;
      }
    });
  });
  return total === 0 ? 0 : Math.round((done/total) * 100);
}
function updateOverallBar(){
  const pct = overallPercent();
  document.getElementById("overallFill").style.width = pct + "%";
  document.getElementById("overallPct").textContent = pct + "%";
}

/* =====================================================================
   4) 렌더링 (학습 화면)
   ===================================================================== */
function renderAll(){ renderAreaTabs(); renderMainPanel(); updateOverallBar(); }

function renderAreaTabs(){
  const nav = document.getElementById("areaTabs");
  nav.innerHTML = "";
  NCS_DATA.areas.forEach(area => {
    const totalQ = LEVELS.reduce((sum, lv) => sum + getQuestionsFor(area, lv).length, 0);
    const tab = document.createElement("div");
    tab.className = "area-tab" + (area.id === currentAreaId ? " active" : "");
    tab.innerHTML = `<span class="num">${area.num}</span>${area.name} <span class="cnt">(${totalQ})</span>`;
    tab.onclick = () => { currentAreaId = area.id; currentSubtab = "이론"; currentLevel = "기초"; quizState=null; listeningState=null; quizMode="practice"; renderAll(); };
    nav.appendChild(tab);
  });
}

function renderMainPanel(){
  const panel = document.getElementById("mainPanel");
  const area = getArea(currentAreaId);
  if (!currentStudent){
    panel.innerHTML = `<div class="coming-soon"><div class="stamp-outline">로그인</div><p>상단에 학번·이름·PIN을 입력하고 학습을 시작해 주세요.</p></div>`;
    return;
  }
  const usable = area.status === "ready" || hasCustomContent(area.id);
  if (!usable){
    panel.innerHTML = `
      <h2 class="area-title">${area.num} · ${area.name}</h2>
      <p class="area-desc">${area.description}</p>
      <div class="coming-soon"><div class="stamp-outline">준비중</div><p>이 영역은 콘텐츠 준비 중입니다. 선생님 모드 &gt; 문제 등록에서 문항을 추가하면 바로 열립니다.</p></div>`;
    return;
  }

  panel.innerHTML = `
    <h2 class="area-title">${area.num} · ${area.name}</h2>
    <p class="area-desc">${area.description}</p>
    <div class="subtabs">
      <div class="subtab ${currentSubtab==='이론'?'active':''}" data-tab="이론">📘 영역별 이론</div>
      <div class="subtab ${currentSubtab==='기출문제'?'active':''}" data-tab="기출문제">✍️ 영역별 기출문제</div>
      ${area.listening ? `<div class="subtab ${currentSubtab==='듣기평가'?'active':''}" data-tab="듣기평가">🎧 영역별 듣기평가</div>` : ""}
      <div class="subtab ${currentSubtab==='영상'?'active':''}" data-tab="영상">▶ 영역별 유튜브 영상</div>
    </div>
    <div class="level-row" id="levelRow"></div>
    <div id="modeRowWrap"></div>
    <div id="subtabBody"></div>
  `;
  panel.querySelectorAll(".subtab").forEach(el => {
    el.onclick = () => { currentSubtab = el.dataset.tab; quizState=null; listeningState=null; renderMainPanel(); };
  });

  renderLevelRow(area);
  if (currentSubtab === "이론"){ document.getElementById("modeRowWrap").innerHTML=""; renderTheory(area); }
  else if (currentSubtab === "기출문제") renderQuizModeSelector(area);
  else if (currentSubtab === "듣기평가"){ document.getElementById("modeRowWrap").innerHTML=""; renderListening(area); }
  else { document.getElementById("modeRowWrap").innerHTML=""; renderVideos(area); }
}

function renderLevelRow(area){
  const row = document.getElementById("levelRow");
  row.innerHTML = "";
  LEVELS.forEach(level => {
    const unlocked = isLevelUnlocked(area.id, level);
    const prog = getLevelProgress(area.id, level);
    const chip = document.createElement("div");
    chip.className = "level-chip" + (level === currentLevel ? " active" : "") + (!unlocked ? " locked" : "");
    const doneMark = prog.quizDone ? ` ✔ ${prog.score}점` : (unlocked ? "" : " 🔒");
    chip.innerHTML = `<span class="lv-${level}">${level}</span><span style="font-size:11px;color:#667;">${doneMark}</span>`;
    if (unlocked) chip.onclick = () => { currentLevel = level; quizState=null; listeningState=null; renderMainPanel(); };
    row.appendChild(chip);
  });
}

function renderTheory(area){
  const body = document.getElementById("subtabBody");
  const items = (area.theory && area.theory[currentLevel]) || [];
  if (items.length === 0){ body.innerHTML = `<p class="note">이 단계의 이론 콘텐츠가 아직 없습니다.</p>`; return; }
  body.innerHTML = items.map(it => `<div class="theory-card"><h4>${it.title}</h4><p>${it.content}</p></div>`).join("");
}

function renderVideos(area){
  const body = document.getElementById("subtabBody");
  const items = (area.videos && area.videos[currentLevel]) || [];
  if (items.length === 0){ body.innerHTML = `<p class="note">이 단계의 영상 목록이 아직 없습니다.</p>`; return; }
  body.innerHTML = `<div class="video-grid">` + items.map(v => {
    const hasId = v.youtubeId && v.youtubeId.trim() !== "";
    const thumb = hasId ? `<iframe src="https://www.youtube.com/embed/${v.youtubeId}" allowfullscreen></iframe>` : `재생목록 미지정<br>아래 링크로 검색해 주세요`;
    const link = hasId ? `https://www.youtube.com/watch?v=${v.youtubeId}` : `https://www.youtube.com/results?search_query=${encodeURIComponent(v.searchQuery || v.title)}`;
    return `<div class="video-card"><div class="video-thumb">${thumb}</div><div class="video-info"><span class="lv">${currentLevel}</span>${v.title}<br><a class="video-link" href="${link}" target="_blank" rel="noopener">${hasId?"유튜브에서 보기 ↗":"유튜브 검색하기 ↗"}</a></div></div>`;
  }).join("") + `</div>`;
}

/* ---------- 듣기평가 (TTS) ---------- */
let cachedKoreanVoice = null;
function pickKoreanVoice(){
  if (cachedKoreanVoice) return cachedKoreanVoice;
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  cachedKoreanVoice = voices.find(v => v.lang === "ko-KR") || voices.find(v => v.lang && v.lang.startsWith("ko")) || null;
  return cachedKoreanVoice;
}
if (window.speechSynthesis){ window.speechSynthesis.onvoiceschanged = () => { cachedKoreanVoice = null; pickKoreanVoice(); }; }
function speakScript(text, rate){
  if (!window.speechSynthesis){ alert("이 브라우저는 음성합성을 지원하지 않습니다."); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "ko-KR"; utter.rate = rate || 1;
  const voice = pickKoreanVoice(); if (voice) utter.voice = voice;
  window.speechSynthesis.speak(utter);
}
function renderListening(area){
  const body = document.getElementById("subtabBody");
  const items = (area.listening && area.listening[currentLevel]) || [];
  if (items.length === 0){ body.innerHTML = `<p class="note">이 단계의 듣기평가 콘텐츠가 아직 없습니다.</p>`; return; }
  if (!listeningState || listeningState.level !== currentLevel){
    listeningState = { level: currentLevel, idx:0, answers:new Array(items.length).fill(null), done:false, selected:null, checked:false, playCount:0 };
  }
  if (listeningState.done){ renderListeningResult(area, items); return; }
  const item = items[listeningState.idx];
  body.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-progress">[듣기평가] ${listeningState.idx+1} / ${items.length}</div>
      <div class="listen-controls">
        <button class="btn btn-navy" id="playBtn">▶ 듣기</button>
        <button class="btn btn-ghost-dark" id="playSlowBtn">🐢 천천히 듣기</button>
        <span class="note" id="playCountNote" style="margin:0;"></span>
      </div>
      <div class="quiz-q">${item.q}</div>
      <div id="choicesWrap">${item.choices.map((c,i)=>`<button class="choice" data-i="${i}">${c}</button>`).join("")}</div>
      <div class="explain-box" id="explainBox">${item.explain||""}</div>
      <div class="footer-nav">
        <button class="btn btn-navy" id="checkBtn" disabled>정답 확인</button>
        <button class="btn btn-gold" id="nextBtn" style="display:none;">${listeningState.idx===items.length-1?"결과 보기":"다음 문제"}</button>
      </div>
    </div>`;
  const updateCountNote = () => { document.getElementById("playCountNote").textContent = listeningState.playCount>0?`재생 ${listeningState.playCount}회`:""; };
  document.getElementById("playBtn").onclick = () => { speakScript(item.script,1); listeningState.playCount++; updateCountNote(); };
  document.getElementById("playSlowBtn").onclick = () => { speakScript(item.script,0.7); listeningState.playCount++; updateCountNote(); };
  const cbs = body.querySelectorAll(".choice");
  cbs.forEach(btn => { btn.onclick = () => { if (listeningState.checked) return; cbs.forEach(b=>b.classList.remove("selected")); btn.classList.add("selected"); listeningState.selected=parseInt(btn.dataset.i); document.getElementById("checkBtn").disabled=false; }; });
  document.getElementById("checkBtn").onclick = () => {
    listeningState.checked = true; listeningState.answers[listeningState.idx] = listeningState.selected;
    cbs.forEach((b,i)=>{ if(i===item.answer) b.classList.add("correct"); else if(i===listeningState.selected) b.classList.add("wrong"); });
    document.getElementById("explainBox").style.display="block";
    document.getElementById("checkBtn").style.display="none";
    document.getElementById("nextBtn").style.display="inline-block";
  };
  document.getElementById("nextBtn").onclick = async () => {
    if (listeningState.idx < items.length-1){ listeningState.idx++; listeningState.selected=null; listeningState.checked=false; listeningState.playCount=0; renderListening(area); }
    else { listeningState.done = true; await finishListening(area, items); renderListening(area); }
  };
}
async function finishListening(area, items){
  const correct = listeningState.answers.filter((a,i)=>a===items[i].answer).length;
  const score = Math.round((correct/items.length)*100);
  listeningState.score = score;
  if (!progressData[area.id]) progressData[area.id] = {};
  if (!progressData[area.id][currentLevel]) progressData[area.id][currentLevel] = { theoryDone:false, quizDone:false, score:0 };
  progressData[area.id][currentLevel].listening = { done:true, score };
  await saveProgress(currentStudent.id, currentStudent.name, progressData);
}
function renderListeningResult(area, items){
  const body = document.getElementById("subtabBody");
  const score = listeningState.score; const pass = score >= PASS_SCORE;
  const rows = items.map((it,i)=>{ const ya=listeningState.answers[i]; const ok=ya===it.answer;
    return `<div class="report-item ${ok?'ok':'no'}"><div class="rq">${i+1}. ${it.q}</div><div>내 답: ${ya!==null?it.choices[ya]:"(선택 안 함)"} ${ok?"✔ 정답":`✘ 오답 (정답: ${it.choices[it.answer]})`}</div>${!ok?`<div class="note">${it.explain||""}</div>`:""}</div>`; }).join("");
  body.innerHTML = `<div class="result-panel"><div class="result-score ${pass?'pass':'fail'}">${score}점</div><p>${pass?"듣기평가 자동채점 완료! 70점 이상입니다.":"70점 미만입니다. 다시 들어보고 재도전해 보세요."}</p><div class="footer-nav" style="justify-content:center; gap:10px;"><button class="btn btn-navy" id="retryListenBtn">다시 풀기</button></div><div class="report-list">${rows}</div></div>`;
  document.getElementById("retryListenBtn").onclick = () => { listeningState=null; renderMainPanel(); };
}

function renderQuiz(area){
  const body = document.getElementById("subtabBody");
  const qs = getQuestionsFor(area, currentLevel);
  if (qs.length === 0){ body.innerHTML = `<p class="note">이 단계의 문제가 아직 없습니다.</p>`; return; }
  if (!quizState || quizState.level !== currentLevel || quizState.mode !== quizMode){

  if (quizState.done){ renderQuizResult(area, qs); return; }
  if (quizMode === "exam") renderExamQuestion(area, qs); else renderPracticeQuestion(area, qs);

      <button class="btn btn-navy" id="checkBtn" disabled>정답 확인</button>

  const cbs = body.querySelectorAll(".choice");
  cbs.forEach(btn => { btn.onclick = () => { if (quizState.checked) return; cbs.forEach(b=>b.classList.remove("selected")); btn.classList.add("selected"); quizState.selected=parseInt(btn.dataset.i); document.getElementById("checkBtn").disabled=false; }; });
  document.getElementById("checkBtn").onclick = () => {

    else { quizState.done = true; await finishQuiz(area, qs); renderQuiz(area); }

function renderExamQuestion(area, qs){
  const body = document.getElementById("subtabBody");
  const q = qs[quizState.idx]; const selected = quizState.answers[quizState.idx];
  body.innerHTML = `<div class="quiz-card">
    <div class="quiz-progress">[모의고사] ${quizState.idx+1} / ${qs.length} · 채점은 제출 후 한번에 표시됩니다</div>
    <div class="quiz-q">${q.q}</div>
    <div id="choicesWrap">${q.choices.map((c,i)=>`<button class="choice ${selected===i?'selected':''}" data-i="${i}">${c}</button>`).join("")}</div>
    <div class="footer-nav">
      <button class="btn btn-navy" id="prevBtn" ${quizState.idx===0?'disabled':''}>이전</button>
      <button class="btn btn-gold" id="examNextBtn">${quizState.idx===qs.length-1?"제출하고 자동채점":"다음"}</button>
    </div></div>`;
  body.querySelectorAll(".choice").forEach(btn => { btn.onclick = () => { body.querySelectorAll(".choice").forEach(b=>b.classList.remove("selected")); btn.classList.add("selected"); quizState.answers[quizState.idx]=parseInt(btn.dataset.i); }; });
  document.getElementById("prevBtn").onclick = () => { quizState.idx--; renderExamQuestion(area, qs); };
  document.getElementById("examNextBtn").onclick = async () => {
    if (quizState.idx < qs.length-1){ quizState.idx++; renderExamQuestion(area, qs); }
    else { quizState.done = true; await finishQuiz(area, qs); renderQuiz(area); }
  };
}
async function finishQuiz(area, qs){
  const correct = quizState.answers.filter((a,i)=>a===qs[i].answer).length;
  const score = Math.round((correct/qs.length)*100);
  quizState.score = score;
  if (!progressData[area.id]) progressData[area.id] = {};
  progressData[area.id][currentLevel] = { theoryDone:true, quizDone:true, score };
  await saveProgress(currentStudent.id, currentStudent.name, progressData);
  updateOverallBar();
}
function renderQuizResult(area, qs){
  const body = document.getElementById("subtabBody");
  const score = quizState.score; const pass = score >= PASS_SCORE;
  const rows = qs.map((q,i)=>{ const ya=quizState.answers[i]; const ok=ya===q.answer;
    return `<div class="report-item ${ok?'ok':'no'}"><div class="rq">${i+1}. ${q.q}</div><div>내 답: ${ya!==null?q.choices[ya]:"(선택 안 함)"} ${ok?"✔ 정답":`✘ 오답 (정답: ${q.choices[q.answer]})`}</div>${!ok?`<div class="note">${q.explain||""}</div>`:""}</div>`; }).join("");
  body.innerHTML = `<div class="result-panel"><div class="result-score ${pass?'pass':'fail'}">${score}점</div><p>${pass?"합격 기준(70점) 이상, 자동채점 완료! 다음 단계가 열렸습니다.":"70점 미만입니다. 이론을 다시 보고 재도전해 보세요."}</p><div class="footer-nav" style="justify-content:center; gap:10px;"><button class="btn btn-navy" id="retryBtn">다시 풀기</button><button class="btn btn-gold" id="goTheoryBtn">이론 다시 보기</button></div><div class="report-list">${rows}</div></div>`;
  document.getElementById("retryBtn").onclick = () => { quizState=null; renderMainPanel(); };
  document.getElementById("goTheoryBtn").onclick = () => { currentSubtab="이론"; renderMainPanel(); };
  renderLevelRow(area);
}

/* ---- 실시간 성적현황 ---- */
function renderScoreDashboard(){
  const adminBody = document.getElementById("adminBody");
  adminBody.innerHTML = `<p><span class="live-dot"></span>${db ? "실시간 반영 중 (Firebase)" : "데모 모드: 4초마다 자동 새로고침"}</p>
    <table><thead><tr><th>학번</th><th>이름</th><th>완료 단계 수</th><th>평균 점수</th></tr></thead><tbody id="scoreTableBody"></tbody></table>`;
  startLiveDashboard();
}
function renderScoreTable(rows){
  const tbody = document.getElementById("scoreTableBody");
  if (!tbody) return;
  tbody.innerHTML = rows.map(r => {
    let doneCount=0, scoreSum=0;
    Object.values(r.progress || {}).forEach(areaProg => { Object.values(areaProg).forEach(lv => { if (lv.quizDone){ doneCount++; scoreSum+=lv.score; } }); });
    const avg = doneCount ? Math.round(scoreSum/doneCount) : 0;
    return `<tr><td>${r.id}</td><td>${r.name||''}</td><td>${doneCount}</td><td>${avg}</td></tr>`;
  }).join("") || `<tr><td colspan="4" class="note">아직 기록이 없습니다.</td></tr>`;
}
function startLiveDashboard(){
  stopLiveDashboard();
  if (db){
    liveUnsub = db.onSnapshot(db.collection(db._db, "students"), snap => {
      const rows = []; snap.forEach(d => rows.push({ id:d.id, ...d.data() })); renderScoreTable(rows);
    });
  } else {
    loadAllStudents().then(renderScoreTable);
    liveInterval = setInterval(() => { loadAllStudents().then(renderScoreTable); }, 4000);
  }
}
function stopLiveDashboard(){
  if (liveUnsub){ liveUnsub(); liveUnsub = null; }
  if (liveInterval){ clearInterval(liveInterval); liveInterval = null; }
}

function renderPdfPreview(){
  const wrap = document.getElementById("pdfPreview");
  if (pdfParsedDrafts.length === 0){ wrap.innerHTML = ""; return; }
  wrap.innerHTML = pdfParsedDrafts.map((d,i) => `
    <div class="preview-item">
      <strong>[${d.areaName || "영역미지정"} / ${d.level || "단계미지정"}]</strong> ${d.q}<br>
      ${d.choices.map((c,ci)=>`${ci+1}) ${c}${ci===d.answer?' ✅':''}`).join(" &nbsp; ")}<br>
      <span class="note">해설: ${d.explain||"(없음)"}</span>
    </div>`).join("") + `<button class="btn btn-green" id="confirmBulkAddBtn" style="margin-top:10px;">이 ${pdfParsedDrafts.length}개 문제 모두 등록</button>`;
  document.getElementById("confirmBulkAddBtn").onclick = async () => {
    let added = 0;
    for (const d of pdfParsedDrafts){
      if (!d.areaId || !d.level) continue;
      await addCustomQuestion(d.areaId, d.level, { q:d.q, choices:d.choices, answer:d.answer, explain:d.explain });
      added++;
    }
    alert(`${added}개 문제가 등록되었습니다.`);
    pdfParsedDrafts = [];
    document.getElementById("pdfPreview").innerHTML = "";
    renderAreaTabs();
  };
}

/* ---- PDF 텍스트 추출 & 파싱 ---- */
async function extractPdfText(file){
  const buf = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
  let full = "";
  for (let i=1; i<=pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    content.items.forEach(item => { full += item.str + (item.hasEOL ? "\n" : " "); });
    full += "\n";
  }
  return full;
}
function findAreaIdByName(name){
  if (!name) return null;
  const clean = name.trim();
  const found = NCS_DATA.areas.find(a => a.name === clean || clean.includes(a.name));
  return found ? found.id : null;
}
function parseQuestionsFromText(text){
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  const drafts = [];
  let curAreaName = null, curAreaId = null, curLevel = null, draft = null;
  const pushDraft = () => {
    if (draft && draft.q && draft.choices.filter(Boolean).length === 4 && draft.answer !== null){
      drafts.push({ ...draft, choices: draft.choices.map(c => c || "") });
    }
    draft = null;
  };
  for (const line of lines){
    let m;
    if ((m = line.match(/^\[영역\]\s*(.+)/))){ curAreaName = m[1].trim(); curAreaId = findAreaIdByName(curAreaName); continue; }
    if ((m = line.match(/^\[단계\]\s*(.+)/))){ curLevel = m[1].trim(); continue; }
    if ((m = line.match(/^Q\d+\.\s*(.*)/))){ pushDraft(); draft = { areaId:curAreaId, areaName:curAreaName, level:curLevel, q:m[1].trim(), choices:[null,null,null,null], answer:null, explain:"" }; continue; }
    if (draft && (m = line.match(/^([1-4])\)\s*(.*)/))){ draft.choices[parseInt(m[1])-1] = m[2].trim(); continue; }
    if (draft && (m = line.match(/^정답\s*[:：]\s*(\d)/))){ draft.answer = parseInt(m[1]) - 1; continue; }
    if (draft && (m = line.match(/^해설\s*[:：]\s*(.*)/))){ draft.explain = m[1].trim(); continue; }
  }
  pushDraft();
  return drafts;
}

customQuestions = await loadCustomQuestions();
renderAll();
