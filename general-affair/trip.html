        // --- 외부 컴포넌트 분리 (입력창 포커스 풀림 방지 및 성능 최적화) ---
        const ApplyGameComponent = ({ phrase, onComplete, onCancel }) => {
            const [input, setInput] = useState('');
            const [errorAnim, setErrorAnim] = useState(false);

            const handleCheck = () => {
                if(input.trim() === phrase) {
                    onComplete();
                } else {
                    setErrorAnim(true);
                    setTimeout(() => setErrorAnim(false), 500);
                }
            };

            return (
                <div className="fixed inset-0 bg-slate-900/95 z-[200] flex justify-center items-center p-4">
                    <div className={`bg-white rounded-3xl p-8 max-w-md w-full text-center shadow-2xl relative border-8 border-pink-200 ${errorAnim ? 'animate-shake border-red-400' : ''}`}>
                        <div className="text-5xl mb-4 text-fuchsia-500"><i className="fas fa-keyboard"></i></div>
                        <h2 className="text-2xl font-black text-fuchsia-800 mb-2">결재 전 타자 미션</h2>
                        <p className="text-slate-600 font-bold mb-6 text-sm">상사에게 서류를 내기 전, 아래 문장을 <span className="text-pink-600">띄어쓰기까지 정확하게</span> 입력하세요!</p>
                        
                        <div className="bg-slate-100 p-4 rounded-xl border-2 border-slate-200 mb-6 font-bold text-lg text-slate-800 select-none break-keep">
                            "{phrase}"
                        </div>

                        <input 
                            type="text" 
                            value={input} 
                            onChange={(e) => setInput(e.target.value)} 
                            placeholder="위 문장을 똑같이 입력하세요" 
                            className="w-full p-4 border-2 border-fuchsia-200 rounded-xl mb-4 text-center font-bold focus:outline-none focus:border-fuchsia-500"
                            onKeyDown={(e) => { if (e.key === 'Enter') handleCheck(); }}
                            autoFocus
                        />
                        
                        <button onClick={handleCheck} className="w-full bg-gradient-to-r from-fuchsia-500 to-pink-500 text-white font-black text-xl py-4 rounded-2xl shadow-lg hover:scale-[1.02] transition">
                            입력 완료 (결재 올리기)
                        </button>
                        <button onClick={onCancel} className="mt-4 text-sm text-slate-400 underline font-bold">기안 취소</button>
                    </div>
                </div>
            );
        };

        const MiniGameComponent = ({ onComplete, onFail, onCancel }) => {
            const [clicks, setClicks] = useState(0);
            const [timeLeft, setTimeLeft] = useState(10);
            const [isPlaying, setIsPlaying] = useState(false);
            const goal = 25;

            useEffect(() => {
                let timer;
                if (isPlaying && timeLeft > 0) timer = setTimeout(() => setTimeLeft(prev => prev - 1), 1000);
                else if (isPlaying && timeLeft === 0) {
                    if (clicks < goal) {
                        onFail();
                        setIsPlaying(false); setClicks(0); setTimeLeft(10);
                    }
                }
                return () => clearTimeout(timer);
            }, [isPlaying, timeLeft, clicks, onFail]);

            useEffect(() => {
                if (clicks >= goal && isPlaying) {
                    setIsPlaying(false);
                    onComplete();
                }
            }, [clicks, isPlaying, onComplete]);

            return (
                <div className="fixed inset-0 bg-slate-900/95 z-[200] flex justify-center items-center p-4">
                    <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl relative border-8 border-pink-200">
                        <div className="text-6xl mb-4 animate-bounce">🏃‍♀️💨</div>
                        <h2 className="text-2xl font-black text-fuchsia-800 mb-2">긴급 미션: 지각 위기!</h2>
                        <p className="text-slate-600 font-bold mb-6 text-sm">10초 안에 <span className="text-red-500 text-lg">광클 {goal}번</span> 채우기</p>
                        {!isPlaying ? (
                            <button onClick={() => { setIsPlaying(true); setClicks(0); setTimeLeft(10); }} className="w-full bg-gradient-to-r from-pink-500 to-fuchsia-600 text-white font-black text-2xl py-5 rounded-2xl hover:scale-105 transition-transform shadow-lg">달리기 시작!</button>
                        ) : (
                            <div>
                                <div className="flex justify-between items-center mb-2 font-black text-lg">
                                    <span className="text-red-500">남은 시간: {timeLeft}초</span>
                                    <span className="text-fuchsia-600">진행률: {Math.floor((clicks/goal)*100)}%</span>
                                </div>
                                <div className="w-full bg-slate-200 h-8 rounded-full overflow-hidden mb-6">
                                    <div className="bg-gradient-to-r from-pink-400 to-fuchsia-600 h-full" style={{width: `${Math.min((clicks/goal)*100, 100)}%`}}></div>
                                </div>
                                <button onMouseDown={() => setClicks(prev => prev + 1)} onTouchStart={(e) => { e.preventDefault(); setClicks(prev => prev + 1); }} className="w-full h-36 bg-fuchsia-100 border-4 border-fuchsia-400 text-fuchsia-800 font-black text-4xl rounded-2xl shadow-inner active:bg-fuchsia-300 no-select">TAP!</button>
                            </div>
                        )}
                        <button onClick={onCancel} className="mt-6 text-sm text-slate-400 underline font-bold">다음에 하기</button>
                    </div>
                </div>
            );
        };

        const SettleGameComponent = ({ onComplete, onCancel }) => {
            const questions = [
                { q: "법인카드로 내 개인적인 물건을 사도 된다?", ans: "X" },
                { q: "스케줄 중 스태프들과 먹은 식대는 법인카드 결제가 가능하다?", ans: "O" },
                { q: "증빙을 위한 영수증은 결제 후 바로 버려도 된다?", ans: "X" },
                { q: "업무상 필요해서 탄 택시비는 교통비로 정산받을 수 있다?", ans: "O" },
                { q: "정산 서류는 금액만 맞으면 영수증 없이도 통과된다?", ans: "X" }
            ];
            const [qIndex] = useState(Math.floor(Math.random() * questions.length));
            const [errorAnim, setErrorAnim] = useState(false);

            const handleAnswer = (choice) => {
                if (choice === questions[qIndex].ans) {
                    onComplete();
                } else {
                    setErrorAnim(true);
                    setTimeout(() => setErrorAnim(false), 400);
                }
            };

            return (
                <div className="fixed inset-0 bg-slate-900/95 z-[200] flex justify-center items-center p-4">
                    <div className={`bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl relative border-8 border-indigo-200 ${errorAnim ? 'animate-shake border-red-400' : ''}`}>
                        <div className="text-6xl mb-4"><i className="fas fa-receipt text-indigo-500"></i></div>
                        <h2 className="text-xl font-black text-indigo-800 mb-2">재무팀 정산 O/X 퀴즈</h2>
                        <p className="text-slate-600 font-bold mb-4 text-sm">정산 서류 제출 전, 알맞은 답을 골라주세요!</p>
                        
                        <div className="bg-slate-100 p-6 rounded-xl border-2 border-slate-200 mb-6 font-bold text-lg text-slate-800 break-keep">
                            Q. {questions[qIndex].q}
                        </div>

                        <div className="grid grid-cols-2 gap-4 mb-4">
                            <button onClick={() => handleAnswer('O')} className="bg-blue-50 hover:bg-blue-100 border-2 border-blue-200 text-blue-600 font-black text-5xl py-6 rounded-2xl transition shadow-sm active:scale-95">O</button>
                            <button onClick={() => handleAnswer('X')} className="bg-red-50 hover:bg-red-100 border-2 border-red-200 text-red-600 font-black text-5xl py-6 rounded-2xl transition shadow-sm active:scale-95">X</button>
                        </div>
                        
                        <button onClick={onCancel} className="mt-2 text-sm text-slate-400 underline font-bold">정산 취소</button>
                    </div>
                </div>
            );
        };

        const CertGameComponent = ({ onComplete, onCancel }) => {
            const [barPos, setBarPos] = useState(0);
            const [isPlaying, setIsPlaying] = useState(true);
            const [result, setResult] = useState(null);

            useEffect(() => {
                if (!isPlaying) return;
                let animationFrameId;
                const start = Date.now();
                const speed = 0.003;
                const animate = () => {
                    const elapsed = Date.now() - start;
                    const pos = (Math.sin(elapsed * speed) + 1) * 50;
                    setBarPos(pos);
                    animationFrameId = requestAnimationFrame(animate);
                };
                animate();
                return () => cancelAnimationFrame(animationFrameId);
            }, [isPlaying]);

            const handleStamp = () => {
                setIsPlaying(false);
                if (barPos >= 40 && barPos <= 60) {
                    setResult('success');
                    setTimeout(() => {
                        onComplete();
                    }, 1500);
                } else {
                    setResult('fail');
                    setTimeout(() => {
                        setIsPlaying(true);
                        setResult(null);
                    }, 1000);
                }
            };

            return (
                <div className="fixed inset-0 bg-slate-900/95 z-[200] flex justify-center items-center p-4">
                    <div className={`bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl relative border-8 border-emerald-200 ${result === 'fail' ? 'animate-shake border-red-400' : ''}`}>
                        <div className="text-6xl mb-4"><i className="fas fa-stamp text-emerald-500"></i></div>
                        <h2 className="text-xl font-black text-emerald-800 mb-2">공공사무행정 결재 미션</h2>
                        <p className="text-slate-600 font-bold mb-6 text-sm">타이밍에 맞춰 직인을 찍어 서류를 발급하세요!<br/><span className="text-emerald-500">(중앙 초록색 영역에 맞추세요)</span></p>
                        
                        <div className="relative w-full bg-slate-200 h-10 rounded-xl mb-8 overflow-hidden shadow-inner border-2 border-slate-300">
                            <div className="absolute left-[40%] right-[40%] h-full bg-emerald-400/50 border-x-2 border-emerald-500"></div>
                            <div className="absolute w-2 h-full bg-red-600 shadow-md top-0" style={{ left: `calc(${barPos}% - 4px)` }}></div>
                        </div>
                        
                        <div className="relative h-20 flex justify-center items-center mb-4">
                            {result === 'success' && <div className="absolute text-red-500 font-black text-4xl border-4 border-red-500 p-2 rounded-full transform -rotate-12 bg-white/90 z-10 whitespace-nowrap">결재 승인</div>}
                            {result === 'fail' && <div className="absolute text-slate-500 font-black text-4xl border-4 border-slate-500 p-2 rounded-full transform rotate-12 bg-white/90 z-10 whitespace-nowrap">위치 이탈</div>}
                            
                            <button onClick={handleStamp} disabled={!isPlaying} className={`w-full h-full text-white font-black text-xl rounded-2xl transition shadow-lg ${!isPlaying ? 'bg-slate-400 cursor-not-allowed' : 'bg-gradient-to-r from-emerald-500 to-teal-600 hover:scale-105 active:scale-95'}`}>
                                직인 쾅! 찍기 (TAP)
                            </button>
                        </div>
                        
                        <button onClick={onCancel} className="mt-2 text-sm text-slate-400 underline font-bold">결재 보류(취소)</button>
                    </div>
                </div>
            );
        };

                                if(userPwForm.currentPw !== user.password) return showAlert('오류', '현재 비밀번호가 틀렸습니다.');
                                if(userPwForm.newPw.length < 4) return showAlert('안내', '새 비밀번호는 4자리 이상 입력해주세요.');
                                await window.fb.updateDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'users', user.employeeId), { password: userPwForm.newPw });
                                setUser({...user, password: userPwForm.newPw});
                                showAlert('성공', '비밀번호가 성공적으로 변경되었습니다.');
                                setShowUserSetting(false);
                                setUserPwForm({currentPw:'', newPw:''});

                                <div>
                                    <label className="block text-sm font-bold text-slate-600 mb-1">새로운 비밀번호</label>

                        <div className="flex items-center gap-2"><i className="fas fa-train text-orange-400 w-5"></i> 교통비: 1회 60,000원</div>
                        <div className="flex items-center gap-2"><i className="fas fa-utensils text-green-400 w-5"></i> 식비: 1식 10,000원</div>
                        <div className="flex items-center gap-2"><i className="fas fa-receipt text-pink-400 w-5"></i> 잡비: 20,000원</div>
                    </div>
                    <p className="mt-3 text-xs text-red-500 bg-red-50 inline-block px-2 py-1 rounded border border-red-100 font-bold">
                        * 1박 2일 이상 출장 시 반드시 폼에서 시작일시와 종료일시를 모두 정확히 기재 바랍니다.
                    </p>
                </div>
            );

            const renderDashboard = () => {
                const classes = ['전체', ...new Set(registeredUsers.map(u => u.className || '미지정'))].sort();
                const filteredUsers = filterClass === '전체' ? registeredUsers : registeredUsers.filter(u => (u.className || '미지정') === filterClass);
                
                return (
                    <div className="space-y-6 animate-fadeIn">
                        <div className="glass-card p-6 rounded-2xl shadow-sm border border-pink-100">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-xl font-bold text-fuchsia-800 flex items-center gap-2">
                                    <i className="fas fa-chart-line"></i> 실시간 업무 진도표
                                    <span className="ml-2 px-2 py-0.5 bg-red-100 text-red-600 rounded-full text-[10px] flex items-center gap-1 animate-pulse shadow-sm"><div className="w-1.5 h-1.5 bg-red-500 rounded-full"></div>LIVE</span>
                                </h2>
                                <select className="p-2 border border-slate-200 rounded-lg text-sm font-bold bg-slate-50/80" value={filterClass} onChange={e=>setFilterClass(e.target.value)}>

                                <table className="w-full text-center text-sm border-collapse bg-white/60 rounded-xl overflow-hidden">

                                            <th className="p-3 font-bold">1단계: 기안서 작성</th>
                                            <th className="p-3 font-bold">미니게임: 현장도착</th>
                                            <th className="p-3 font-bold">2단계: 정산 완료</th>
                                            <th className="p-3 font-bold">3단계: 공문서 결재</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {filteredUsers.map(u => {
                                            const p = u.progress || {};
                                            return (
                                                <tr key={u.employeeId} className={`border-b border-slate-100/50 ${u.employeeId === user.employeeId ? 'bg-fuchsia-100/40' : 'hover:bg-white/40'}`}>

                                                    <td className="p-3">
                                                        {p.step1 ? <span className="px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700 shadow-sm">완료</span> : 
                                                                   <span className="px-3 py-1 rounded-full text-xs font-bold bg-blue-100 text-blue-700 shadow-sm animate-pulse">작성중✍️</span>}
                                                    </td>
                                                    <td className="p-3">
                                                        {p.gameDone ? <span className="px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700 shadow-sm">도착</span> : 
                                                         (p.step1 ? <span className="px-3 py-1 rounded-full text-xs font-bold bg-purple-100 text-purple-700 shadow-sm animate-pulse">이동중🏃‍♂️</span> : 
                                                                    <span className="px-3 py-1 rounded-full text-xs font-bold bg-slate-100 text-slate-400">대기</span>)}
                                                    </td>
                                                    <td className="p-3">
                                                        {p.step2 ? <span className="px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700 shadow-sm">완료</span> : 
                                                         (p.gameDone ? <span className="px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 text-yellow-700 shadow-sm animate-pulse">정산중💳</span> : 
                                                                       <span className="px-3 py-1 rounded-full text-xs font-bold bg-slate-100 text-slate-400">대기</span>)}
                                                    </td>
                                                    <td className="p-3">
                                                        {p.step3 ? <span className="px-3 py-1 rounded-full text-xs font-bold bg-green-100 text-green-700 shadow-sm">최종완료🎉</span> : 
                                                         (p.step2 ? <span className="px-3 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700 shadow-sm animate-pulse">심사중🗂️</span> : 
                                                                    <span className="px-3 py-1 rounded-full text-xs font-bold bg-slate-100 text-slate-400">대기</span>)}
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                        {filteredUsers.length === 0 && <tr><td colSpan="5" className="p-6 text-slate-400 font-bold bg-white/50">해당 조건의 명단이 없습니다.</td></tr>}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            const artistImages = {
                '뉴진스': './NEWJEANS.png',
                '아이브': './IVE.png',
                '에스파': './AESPA.png',
                '세븐틴': './SEVENTEEN.png',
                '방탄소년단': './BTS.png',
                '투어스': './TWS.png',
                '코르티스': './CORTIS.png'
            };

            const fallbackImages = {
                '뉴진스': 'https://placehold.co/300x400/ffe4e6/be185d?font=playfair&text=NewJeans',
                '아이브': 'https://placehold.co/300x400/fef08a/854d0e?font=playfair&text=IVE',
                '에스파': 'https://placehold.co/300x400/e9d5ff/6b21a8?font=playfair&text=aespa',
                '세븐틴': 'https://placehold.co/300x400/bfdbfe/1e3a8a?font=playfair&text=SEVENTEEN',
                '방탄소년단': 'https://placehold.co/300x400/dcfce7/166534?font=playfair&text=BTS',
                '투어스': 'https://placehold.co/300x400/ffedd5/c2410c?font=playfair&text=TWS',
                '코르티스': 'https://placehold.co/300x400/f3e8ff/7e22ce?font=playfair&text=CORTIS'

                            <div key={newTrip.artist} className="bg-white/80 p-4 rounded-xl shadow-xl border border-slate-200/50 transform -rotate-2 hover:rotate-0 hover:scale-105 transition-all duration-300 max-w-[240px] animate-fadeIn relative group">
                                <div className="w-full h-64 flex justify-center items-center bg-slate-100/50 rounded-lg shadow-inner overflow-hidden">
                                    <img 
                                        src={customArtistImage || artistImages[newTrip.artist]} 
                                        alt={newTrip.artist} 
                                        onError={(e) => { if(!customArtistImage) e.target.src = fallbackImages[newTrip.artist]; }}
                                        className="w-full h-full object-contain transition-all" 
                                    />
                                </div>

                                    <i className="fas fa-camera text-3xl mb-2"></i>

                                </label>
                                <div className="text-center mt-4 mb-1">
                                    <span className="font-jua text-2xl text-fuchsia-600">{newTrip.artist}</span>

                                </div>
                            </div>
                        </div>

                        <div className="md:w-2/3 w-full">
                            <form onSubmit={handleApplyStart} className="space-y-5">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div><label className="block text-sm font-bold text-slate-700 mb-1">담당 아티스트</label>
                                        <select className="w-full p-3 border border-slate-200/50 rounded-xl bg-white/70 focus:ring-2 focus:ring-fuchsia-200 focus:outline-none transition-shadow" value={newTrip.artist} onChange={e=>{setNewTrip({...newTrip, artist:e.target.value}); setCustomArtistImage(null);}}>
                                            <option>뉴진스</option>
                                            <option>아이브</option>
                                            <option>에스파</option>
                                            <option>세븐틴</option>
                                            <option>방탄소년단</option>
                                            <option>투어스</option>
                                            <option>코르티스</option>
                                        </select>
                                    </div>
                                    <div><label className="block text-sm font-bold text-slate-700 mb-1">출장 경로 및 장소</label>
                                        <input type="text" required placeholder="예: 마산 -> 서울" className="w-full p-3 border border-slate-200/50 rounded-xl bg-white/70 focus:ring-2 focus:ring-fuchsia-200 focus:outline-none transition-shadow" value={newTrip.destination} onChange={e=>setNewTrip({...newTrip, destination:e.target.value})} />
                                    </div>
                                </div>
                                
                                <div>
                                    <label className="block text-sm font-bold text-slate-700 mb-2">출장 일정 (시작 및 종료)</label>
                                    <div className="flex flex-col sm:flex-row gap-2 items-center bg-white/50 p-2 rounded-xl border border-slate-200/50 shadow-inner">
                                        <div className="w-full relative bg-white/80 rounded-lg border border-slate-100 shadow-sm transition hover:border-fuchsia-300">
                                            <span className="absolute left-3 top-2 text-fuchsia-500 text-[10px] font-black tracking-wider"><i className="fas fa-plane-departure mr-1"></i>출발일시</span>
                                            <input type="datetime-local" required className="w-full p-3 pt-6 border-none bg-transparent outline-none text-sm font-bold text-slate-700" value={newTrip.startDate} onChange={e=>setNewTrip({...newTrip, startDate:e.target.value})} />
                                        </div>
                                        <div className="w-8 h-8 rounded-full bg-white flex items-center justify-center shadow-sm shrink-0 border border-slate-200 z-10 text-slate-400">
                                            <i className="fas fa-chevron-right sm:block hidden"></i>
                                            <i className="fas fa-chevron-down block sm:hidden"></i>
                                        </div>
                                        <div className="w-full relative bg-white/80 rounded-lg border border-slate-100 shadow-sm transition hover:border-fuchsia-300">
                                            <span className="absolute left-3 top-2 text-fuchsia-500 text-[10px] font-black tracking-wider"><i className="fas fa-plane-arrival mr-1"></i>도착(종료)일시</span>
                                            <input type="datetime-local" required className="w-full p-3 pt-6 border-none bg-transparent outline-none text-sm font-bold text-slate-700" value={newTrip.endDate} onChange={e=>setNewTrip({...newTrip, endDate:e.target.value})} />
                                        </div>
                                    </div>
                                </div>

                                <div><label className="block text-sm font-bold text-slate-700 mb-1">지원 목적 및 내용</label>

                                </div>
                                <div className="bg-pink-50/80 p-4 rounded-xl border border-pink-200/50">
                                    <label className="block text-sm font-bold text-pink-800 mb-1">법인카드 예상 사용액 (예산 신청)</label>
                                    <div className="relative">
                                        <span className="absolute left-4 top-3 text-pink-500 font-bold">₩</span>
                                        <input type="number" required placeholder="50000" className="w-full p-3 pl-10 border border-white rounded-lg bg-white/90 font-bold text-lg text-fuchsia-900 focus:ring-2 focus:ring-fuchsia-300 focus:outline-none transition-shadow" value={newTrip.budget} onChange={e=>setNewTrip({...newTrip, budget:e.target.value})} />
                                    </div>
                                </div>
                                <button type="submit" className="w-full bg-gradient-to-r from-fuchsia-500 to-pink-500 text-white font-black tracking-wide py-4 rounded-xl hover:shadow-lg hover:scale-[1.02] transition-all shadow-md text-lg">결재 올리기 (미니게임 시작)</button>
                            </form>
                        </div>
                    </div>
                </div>
            );

            const renderSettleTab = () => {
                const myPending = trips.filter(t => t.employeeId === user.employeeId && t.status !== '정산완료');
                return (
                    <div className="max-w-4xl mx-auto relative animate-fadeIn">
                        {showEventModal && currentEvent && (
                            <div className="fixed inset-0 bg-black/60 z-[100] flex justify-center items-center p-4">
                                <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-sm text-center transform scale-105 border-4 border-yellow-300">
                                    <div className="text-7xl mb-4 float-anim">{currentEvent.icon}</div>
                                    <h3 className="text-2xl font-black text-fuchsia-800 mb-2">돌발 상황 발생!</h3>

                                    <p className="text-sm text-slate-500 mb-6">{currentEvent.desc}</p>
                                    <button onClick={() => {

                                            setExpenseItems([...expenseItems, {category: currentEvent.category, amount: currentEvent.amount, note: currentEvent.note, hasReceipt: true}]);
                                            sendChatMessage('🚨 법인카드 알림', `${user.name} 사원이 [${currentEvent.title}] 사유로 결제했습니다!`, '💳', 'alert');
                                        } else {
                                            sendChatMessage('🎉 알림', `${user.name} 사원님이 [${currentEvent.title}] 당첨!`, '🎁');
                                        }
                                        setShowEventModal(false);
                                    }} className="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-white font-bold py-3 rounded-xl shadow-lg">상황 대처하기 (영수증 추가)</button>
                                </div>
                            </div>
                        )}

                        <div className="glass-card p-6 md:p-8 rounded-2xl shadow-sm border border-pink-100">
                            <h2 className="text-2xl font-black text-fuchsia-800 mb-6 border-b-2 border-pink-100/50 pb-4">
                                <i className="fas fa-credit-card"></i> 회계실무: 법인카드 지출 정산

                            <CompanyRules />

                                <div className="mb-6">
                                    <label className="block text-sm font-bold text-slate-700 mb-2">정산할 내 스케줄 선택</label>

                                        <option value="">-- 선택하세요 --</option>
                                        {myPending.map(t => <option key={t.id} value={t.id}>[{t.artist}] {t.destination} (예산: {Number(t.budget).toLocaleString()}원)</option>)}
                                    </select>
                                </div>
                                {selectedTripId && (
                                    <div className="animate-fadeIn">
                                        <div className="flex justify-between items-end mb-4">

                                                <button type="button" onClick={() => { setCurrentEvent(events[Math.floor(Math.random() * events.length)]); setShowEventModal(true); }} className="bg-gradient-to-r from-purple-500 to-indigo-500 text-white text-xs font-bold px-3 py-2 rounded-lg shadow-md sparkle-anim"><i className="fas fa-dice"></i> 돌발카드 뽑기</button>
                                                <button type="button" onClick={() => setExpenseItems([...expenseItems, {category:'식대(간식)', amount:'', note:'', hasReceipt:false}])} className="bg-white/80 text-slate-700 text-xs font-bold px-3 py-2 rounded-lg hover:bg-white shadow-sm border border-slate-200/50"><i className="fas fa-plus"></i> 일반 내역 추가</button>

                                        </div>

                                                        {item.hasReceipt ? '제출완료' : '영수증 찍기'}
                                                    </button>
                                                </div>
                                            ))}
                                            <div className="text-right pt-4 border-t border-slate-200/50 mt-4">
                                                <span className="text-sm text-slate-500 mr-2">총 사용 금액:</span>
                                                <span className="text-xl font-black text-fuchsia-700">{expenseItems.reduce((s, i)=>s+Number(i.amount||0),0).toLocaleString()}원</span>

                                            if(!file) return;
                                            const reader = new FileReader();
                                            reader.onload = async (evt) => {
                                                try {
                                                    const bstr = evt.target.result;
                                                    const wb = XLSX.read(bstr, {type:'binary'});
                                                    const ws = wb.Sheets[wb.SheetNames[0]];
                                                    const data = XLSX.utils.sheet_to_json(ws, {header:1});
                                                    let count = 0;
                                                    for (let i = 1; i < data.length; i++) {
                                                        const row = data[i];
                                                        if (row[0] && row[1] && row[2]) {
                                                            const cls = String(row[0]).trim();
                                                            const empId = String(row[1]).trim();
                                                            const name = String(row[2]).trim();
                                                            const userData = {

                                                            await window.fb.setDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'users', empId), userData);

                                                        }

                                            };
                                            reader.readAsBinaryString(file);
                                        }} className="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-fuchsia-50 file:text-fuchsia-700 hover:file:bg-fuchsia-100" />

                                            await window.fb.setDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'users', userData.employeeId), userData);

                                                            await window.fb.deleteDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'users', u.employeeId));

                                                    }} className="text-red-500 hover:text-white border border-red-200 hover:bg-red-500 hover:border-red-500 px-2 py-1 rounded text-[10px] font-bold transition-all shadow-sm">
                                                        <i className="fas fa-trash-alt mr-1"></i>삭제
                                                    </button>

                                            e.preventDefault();

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );

                            <div className="absolute bottom-10 left-10 text-4xl opacity-60 float-anim" style={{animationDelay: '1s'}}>🌸</div>
                            <div className="absolute top-20 right-10 text-5xl opacity-60 float-anim" style={{animationDelay: '0.5s'}}>🎵</div>
                            <div className="absolute bottom-20 right-20 text-4xl opacity-60 float-anim" style={{animationDelay: '1.5s'}}>💖</div>
                            <div className="absolute top-32 left-20 text-3xl opacity-60 float-anim" style={{animationDelay: '2s'}}>🎀</div>
                            <div className="absolute bottom-32 left-1/3 text-2xl opacity-60 float-anim" style={{animationDelay: '0.8s'}}>✨</div>
                            <div className="absolute top-1/4 right-1/4 text-3xl opacity-60 float-anim" style={{animationDelay: '2.5s'}}>🦋</div>

                            <div className="glass-card p-8 rounded-[2rem] shadow-2xl w-full max-w-md z-10 border-4 border-white/60 relative">
                                <div className="text-center mb-6">
                                    <div className="w-full flex justify-center mb-3">
                                        <svg viewBox="0 0 120 120" className="w-24 h-24 drop-shadow-xl float-anim">
                                            <path d="M60 10 C 85 10, 95 45, 60 65 C 25 45, 35 10, 60 10 Z" fill="#b3b7bb" stroke="#003984" strokeWidth="4" strokeLinejoin="round"/>
                                            <path d="M25 45 C -5 60, 10 105, 50 95 C 70 70, 40 45, 25 45 Z" fill="#00a2e8" stroke="#003984" strokeWidth="4" strokeLinejoin="round"/>
                                            <path d="M95 45 C 125 60, 110 105, 70 95 C 50 70, 80 45, 95 45 Z" fill="#8fc23f" stroke="#003984" strokeWidth="4" strokeLinejoin="round"/>
                                            <circle cx="60" cy="58" r="26" fill="#003984" />
                                            <text x="60" y="70" fontFamily="'Georgia', serif" fontSize="34" fill="white" fontWeight="bold" textAnchor="middle">H</text>
                                        </svg>
                                    </div>
                                    <p className="font-bold text-slate-700 font-gowun text-xs mb-3 tracking-wider drop-shadow-sm">학교법인 한효학원 한일여자고등학교</p>
                                    <div className="mb-5 mt-1">
                                        <span className="font-black text-3xl font-jua animate-text-glow tracking-widest relative z-10">
                                            ✨공공사무행정과✨
                                        </span>
                                    </div>
                                    <h1 className="text-4xl font-jua text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-600 to-pink-500 mb-2 pt-4 border-t-2 border-pink-300/50 drop-shadow-sm">Hanil STAR ENT.</h1>
                                    <p className="font-bold text-slate-600 font-gowun">경영지원본부 신입사원 포털</p>
                                </div>
                                
                                {!isDbReady ? (
                                    <div className="text-center text-pink-600 py-8 font-bold"><i className="fas fa-spinner fa-spin mr-2"></i> 시스템 연결 중...</div>
                                ) : (
                                    <form onSubmit={handleLogin} className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-bold text-fuchsia-900 mb-1 ml-1 drop-shadow-sm">학번 (사원번호)</label>
                                            <input type="text" className="w-full p-3 border-2 border-pink-200 rounded-2xl focus:border-pink-400 focus:outline-none bg-white/80 transition-shadow" value={loginForm.employeeId} onChange={e => setLoginForm({...loginForm, employeeId: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-fuchsia-900 mb-1 ml-1 drop-shadow-sm">이름</label>
                                            <input type="text" className="w-full p-3 border-2 border-pink-200 rounded-2xl focus:border-pink-400 focus:outline-none bg-white/80 transition-shadow" value={loginForm.name} onChange={e => setLoginForm({...loginForm, name: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-fuchsia-900 mb-1 ml-1 drop-shadow-sm">비밀번호</label>
                                            <input type="password" placeholder="초기비번: 1234" className="w-full p-3 border-2 border-pink-200 rounded-2xl focus:border-pink-400 focus:outline-none bg-white/80 transition-shadow" value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} />
                                        </div>
                                        <button type="submit" className="w-full bg-gradient-to-r from-fuchsia-500 to-pink-500 text-white font-bold py-4 rounded-2xl hover:shadow-lg hover:scale-[1.02] transition-all text-lg mt-4 shadow-md font-jua tracking-wider">출근하기 🌸</button>
                                    </form>
                                )}
                                <div className="mt-6 text-center">
                                    <button onClick={() => setShowAdminLogin(true)} className="text-xs text-slate-500 hover:text-fuchsia-700 font-bold underline transition-colors drop-shadow-sm">선생님 전용 관리페이지</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-girlish relative">
                    {renderCustomModal()}
                    {renderUserSettingModal()}
                    
                    {showApplyGame && <ApplyGameComponent 
                        phrase={applyGamePhrase}
                        onComplete={() => { setShowApplyGame(false); executeApply(); }}
                        onCancel={() => setShowApplyGame(false)}
                    />}
                    {showMiniGame && <MiniGameComponent 
                        onComplete={() => {
                            showAlert('도착 완료', '🏃‍♀️ 스케줄 현장 도착 성공! 이제 정산업무를 시작합니다.');
                            updateUserProgress(user.employeeId, 'gameDone');
                            setShowMiniGame(false);
                            setActiveTab('settle');
                            sendChatMessage('시스템 알림', `${user.name} 사원이 무사히 스케줄 현장에 도착했습니다! 💦`, '🏃‍♀️', 'normal', true);
                        }}
                        onFail={() => showAlert('실패', '앗! 차량을 놓쳤습니다. 다시 뛰어보세요!')}
                        onCancel={() => setShowMiniGame(false)}
                    />}
                    {showSettleGame && <SettleGameComponent 
                        onComplete={() => {
                            setShowSettleGame(false);
                            finalizeSettlement();
                        }}
                        onCancel={() => setShowSettleGame(false)}
                    />}
                    {showCertGame && <CertGameComponent 
                        onComplete={() => {
                            finalizeIssueCert(certToIssue);
                            setShowCertGame(false);
                        }}
                        onCancel={() => setShowCertGame(false)}
                    />}
                    
                    <div className={`fixed bottom-4 right-4 z-50 flex flex-col items-end transition-all duration-300 ${isChatOpen ? 'w-[350px] h-[500px]' : 'w-14 h-14'} no-print`}>
                        {!isChatOpen ? (
                            <button onClick={() => setIsChatOpen(true)} className="w-14 h-14 bg-fuchsia-600 text-white rounded-full shadow-2xl flex justify-center items-center text-2xl hover:bg-fuchsia-700 transition relative animate-bounce border-2 border-white/50">
                                <i className="fas fa-comments"></i><span className="absolute top-0 right-0 w-4 h-4 bg-red-500 border-2 border-white rounded-full"></span>
                            </button>
                        ) : (
                            <div className="w-full h-full glass-card rounded-2xl shadow-2xl flex flex-col overflow-hidden border-2 border-pink-200 animate-fadeIn">
                                <div className="bg-gradient-to-r from-fuchsia-600 to-pink-500 p-4 text-white flex justify-between items-center shadow-md z-10">
                                    <h3 className="font-bold flex items-center gap-2"><i className="fas fa-comment-dots"></i> Hanil STAR 메신저</h3>
                                    <button onClick={() => setIsChatOpen(false)} className="hover:text-pink-200"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 bg-white/60 chat-scrollbar space-y-4 flex flex-col backdrop-blur-sm">
                                    {messages.map(msg => (
                                        <div key={msg.id} className={`flex gap-2 ${msg.sender === user.name ? 'flex-row-reverse' : ''} animate-fadeIn`}>
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm shadow-sm shrink-0 ${msg.type === 'notice' ? 'bg-orange-100 text-orange-600' : 'bg-white border border-slate-200'}`}>
                                                {msg.icon}
                                            </div>
                                            <div className={`flex flex-col ${msg.sender === user.name ? 'items-end' : 'items-start'} max-w-[75%]`}>
                                                <span className="text-[10px] text-slate-600 font-bold mb-0.5">{msg.sender} <span className="font-normal opacity-70 ml-1">{msg.time}</span></span>
                                                <div className={`p-2.5 rounded-2xl text-sm shadow-sm ${msg.sender === user.name ? 'bg-fuchsia-500 text-white rounded-tr-none' : msg.type === 'notice' ? 'bg-orange-50 text-orange-800 border border-orange-200 font-bold rounded-tl-none' : msg.type === 'alert' ? 'bg-red-50 text-red-700 border border-red-200 rounded-tl-none' : 'bg-white text-slate-700 border border-slate-200 rounded-tl-none'}`}>
                                                    {msg.content}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={messagesEndRef} />
                                </div>
                                <form onSubmit={handleChatSubmit} className="p-3 bg-white/90 border-t border-pink-100 flex gap-2">
                                    <input type="text" placeholder="메시지 보내기..." className="flex-1 p-2 bg-slate-50 border border-pink-200 rounded-lg text-sm focus:outline-none focus:border-fuchsia-400" value={chatInput} onChange={e=>setChatInput(e.target.value)} />
                                    <button type="submit" className="bg-fuchsia-600 text-white p-2 rounded-lg hover:bg-fuchsia-700 shadow-sm"><i className="fas fa-paper-plane"></i></button>
                                </form>
                            </div>
                        )}
                    </div>

                    <header className="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-40 border-b border-pink-200/60 no-print">
                        <MarqueeBanner />
                        <div className="max-w-5xl mx-auto px-4 mt-2">
                            <div className="flex items-center justify-between h-14">
                                <div className="flex items-center gap-2 cursor-pointer" onClick={() => showConfirm('메인 화면 이동', '현재 화면에서 로그아웃 되고 로그인 화면으로 돌아가시겠습니까?\n(작성 중이던 내용은 초기화됩니다.)', resetSessionData)}>
                                    <div className="bg-gradient-to-br from-fuchsia-500 to-pink-500 w-8 h-8 rounded-xl flex items-center justify-center text-white shadow-sm"><i className="fas fa-star"></i></div>
                                    <span className="font-black text-fuchsia-900 tracking-tight text-lg font-jua hover:text-fuchsia-600 transition drop-shadow-sm">Hanil STAR ENT.</span>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="bg-white/80 px-3 py-1.5 rounded-full border border-pink-200 flex items-center gap-2 shadow-sm">
                                        <span className="text-xs font-bold text-fuchsia-800">[{user.className||'소속'}] {user.employeeId} {user.name} 님</span>
                                        <button onClick={() => setShowUserSetting(true)} className="text-fuchsia-500 hover:text-fuchsia-700"><i className="fas fa-cog"></i></button>
                                    </div>
                                    <button onClick={() => showConfirm('퇴근 확인', '퇴근하시겠습니까?\n(작성 중이던 내용은 초기화됩니다.)', resetSessionData)} className="text-xs bg-white/80 hover:bg-pink-100 text-slate-600 border border-pink-200 font-bold px-3 py-1.5 rounded-full transition shadow-sm"><i className="fas fa-sign-out-alt"></i> 퇴근</button>
                                </div>
                            </div>
                            <nav className="flex gap-2 overflow-x-auto no-scrollbar pb-2 pt-1">
                                {[
                                    { id: 'dashboard', label: '📊 전사 현황판' },
                                    { id: 'apply', label: '📝 총무 (기안작성)' },
                                    { id: 'settle', label: '💳 회계실무 (정산)' },
                                    { id: 'cert', label: '🗂️ 사무행정 (제증명)' },
                                    { id: 'life', label: '☕ 사내 생활 (점심/비품)' }
                                ].map((tab) => (
                                    <button key={tab.id} onClick={() => handleTabChange(tab.id)} className={`px-4 py-2 text-sm font-bold rounded-xl transition-all whitespace-nowrap shadow-sm border border-transparent ${activeTab === tab.id ? 'bg-gradient-to-r from-fuchsia-500 to-pink-500 text-white' : 'bg-white/70 text-slate-600 hover:bg-white border-pink-100'}`}>
                                        {tab.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="flex-1 max-w-5xl mx-auto w-full px-4 py-8 no-print pb-24 relative z-10">
                        {user && (
                            <div className="bg-gradient-to-r from-fuchsia-600 via-purple-500 to-pink-500 text-white rounded-2xl p-5 mb-8 shadow-xl relative overflow-hidden animate-fadeIn border border-fuchsia-400/50">
                                <div className="absolute top-0 right-0 opacity-10 text-9xl transform translate-x-4 -translate-y-8 pointer-events-none"><i className="fas fa-route"></i></div>
                                <h3 className="font-black text-lg mb-3 relative z-10 drop-shadow-md"><i className="fas fa-map-signs"></i> 총무/회계 신입사원 필수 업무 흐름도</h3>
                                <div className="flex flex-wrap items-center gap-3 text-sm font-bold relative z-10">
                                    <span className="bg-white/20 backdrop-blur-sm px-3 py-2 rounded-xl flex items-center gap-2 shadow-sm border border-white/30">1️⃣ 사전 기안 <span className="text-[10px] font-normal opacity-90 px-1.5 py-0.5 bg-black/30 rounded-full">타자 미션</span></span>
                                    <i className="fas fa-chevron-right text-pink-200"></i>
                                    <span className="bg-white/20 backdrop-blur-sm px-3 py-2 rounded-xl flex items-center gap-2 shadow-sm border border-white/30 animate-pulse">🏃‍♂️ 현장 도착 <span className="text-[10px] font-normal opacity-90 px-1.5 py-0.5 bg-black/30 rounded-full">광클 미션</span></span>
                                    <i className="fas fa-chevron-right text-pink-200"></i>
                                    <span className="bg-white/20 backdrop-blur-sm px-3 py-2 rounded-xl flex items-center gap-2 shadow-sm border border-white/30">2️⃣ 사후 정산 <span className="text-[10px] font-normal opacity-90 px-1.5 py-0.5 bg-black/30 rounded-full">퀴즈 미션</span></span>
                                    <i className="fas fa-chevron-right text-pink-200"></i>
                                    <span className="bg-white/20 backdrop-blur-sm px-3 py-2 rounded-xl flex items-center gap-2 shadow-sm border border-white/30">3️⃣ 제증명 <span className="text-[10px] font-normal opacity-90 px-1.5 py-0.5 bg-black/30 rounded-full">타이밍 미션</span></span>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dashboard' && renderDashboard()}
                        {activeTab === 'apply' && renderApplyTab()}
                        {activeTab === 'settle' && renderSettleTab()}
                        {activeTab === 'cert' && renderCertTab()}
                        {activeTab === 'life' && renderCompanyLifeTab()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
